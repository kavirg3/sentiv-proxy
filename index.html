      </div>
      <p style={{ fontSize: 13, color: C.muted, margin: "0 0 12px" }}>
        Feed it PDFs, Word, text and CSV files, pasted text, or saved links — every AI feature in the platform learns from what lives here. New items land in the folder you're viewing.
      </p>

      <div style={{ display: "flex", gap: 7, flexWrap: "wrap", alignItems: "center", marginBottom: 12 }}>
        <button style={chipStyle(activeFolder === "all")} onClick={() => setActiveFolder("all")}>All <span style={{ ...mono, fontSize: 10, opacity: 0.75 }}>{countFor("all")}</span></button>
        {folders.map((f) => (
          <button key={f} style={chipStyle(activeFolder === f)} onClick={() => setActiveFolder(f)}>
            <span aria-hidden="true" style={{ fontSize: 11 }}>▣</span>{f} <span style={{ ...mono, fontSize: 10, opacity: 0.75 }}>{countFor(f)}</span>
            {activeFolder === f && <span title="Delete folder (documents move to Unfiled)" onClick={(e) => { e.stopPropagation(); deleteFolder(f); }} style={{ marginLeft: 2, opacity: 0.8 }}>✕</span>}
          </button>
        ))}
        {docs.some((d) => !d.folder) && folders.length > 0 && (
          <button style={chipStyle(activeFolder === "__unfiled")} onClick={() => setActiveFolder("__unfiled")}>Unfiled <span style={{ ...mono, fontSize: 10, opacity: 0.75 }}>{countFor("__unfiled")}</span></button>
        )}
        {showNewFolder ? (
          <span style={{ display: "inline-flex", gap: 6, alignItems: "center" }}>
            <Input value={newFolder} onChange={setNewFolder} placeholder="Folder name" style={{ maxWidth: "100%", width: 150, padding: "6px 10px", fontSize: 12 }} />
            <Btn small kind="gold" onClick={addFolder}>Create</Btn>
            <Btn small onClick={() => { setShowNewFolder(false); setNewFolder(""); }}>✕</Btn>
          </span>
        ) : (
          <button style={chipStyle(false)} onClick={() => setShowNewFolder(true)}>+ New folder</button>
        )}
      </div>

      {folders.length === 0 && docs.length > 0 && (
        <div style={{ display: "flex", gap: 7, flexWrap: "wrap", alignItems: "center", marginBottom: 12 }}>
          <span style={{ fontFamily: "'Inter', system-ui, sans-serif", fontSize: 12, color: C.muted }}>Quick setup:</span>
          {["Products", "Case studies", "Pricing", "Competitors"].map((f) => (
            <button key={f} style={chipStyle(false)} onClick={() => update({ brainFolders: [...(state.brainFolders || []), f] })}>+ {f}</button>
          ))}
        </div>
      )}

      {docs.length > 3 && <Input value={q} onChange={setQ} placeholder="Search the brain — titles, tags, content, URLs…" style={{ marginBottom: 12, maxWidth: 420 }} />}
      {reading && <Spinner label="READING FILES…" />}
      {upMsg && <div style={{ ...mono, fontSize: 11, color: upErr ? C.pink : C.ok, marginBottom: 12, lineHeight: 1.6 }}>{upMsg}</div>}

      {showLink && (
        <Card style={{ marginBottom: 16 }}>
          <div className="ssh-grid2" style={{ display: "grid", gridTemplateColumns: "2fr 1fr 1fr auto", gap: 10, alignItems: "end" }}>
            <div><Label>URL</Label><Input value={linkDraft.url} onChange={(v) => setLinkDraft({ ...linkDraft, url: v })} placeholder="https://sentiv.com/products/tetra" /></div>
            <div><Label>Title (optional)</Label><Input value={linkDraft.title} onChange={(v) => setLinkDraft({ ...linkDraft, title: v })} placeholder="e.g. TETRA product page" /></div>
            <div><Label>Tags</Label><Input value={linkDraft.tags} onChange={(v) => setLinkDraft({ ...linkDraft, tags: v })} placeholder="product, radios" /></div>
            <Btn kind="gold" onClick={addLink} disabled={linkBusy}>{linkBusy ? "Reading…" : "Save link"}</Btn>
          </div>
        </Card>
      )}

      {showAdd && (
        <Card style={{ marginBottom: 16 }}>
          <div className="ssh-grid2" style={{ display: "grid", gridTemplateColumns: "2fr 1fr", gap: 10, marginBottom: 10 }}>
            <div><Label>Title</Label><Input value={draft.title} onChange={(v) => setDraft({ ...draft, title: v })} placeholder="e.g. Mining case study — Hluma Platinum" /></div>
            <div><Label>Tags (comma-separated)</Label><Input value={draft.tags} onChange={(v) => setDraft({ ...draft, tags: v })} placeholder="mining, case study" /></div>
          </div>
          <Label>Content (paste the text)</Label>
          <TextArea rows={8} value={draft.content} onChange={(v) => setDraft({ ...draft, content: v })} placeholder="Paste the document text here — copy from your PDF/Word doc…" />
          <div style={{ marginTop: 10 }}><Btn kind="gold" onClick={add}>Save to brain</Btn></div>
        </Card>
      )}

      {docs.length === 0 && !showAdd && <div style={{ ...mono, fontSize: 11, color: C.muted }}>The brain is empty — upload a file, paste text, or save a link above. Product sheets, case studies, pricing and competitor intel all sharpen every AI draft.</div>}
      {docs.length > 0 && visible.length === 0 && <div style={{ ...mono, fontSize: 11, color: C.muted }}>Nothing here{ql ? " matches the search" : ""} — try another folder{ql ? " or clear the search" : ""}.</div>}

      <div style={{ display: "grid", gap: 10 }}>
        {visible.map((d) => (
          <Card key={d.id}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start", gap: 10, flexWrap: "wrap" }}>
              <div style={{ minWidth: 0, flex: 1 }}>
                <div style={{ fontSize: 14, fontWeight: 700, display: "flex", alignItems: "center", gap: 7, flexWrap: "wrap" }}>
                  {d.type === "link" && <span style={{ ...mono, fontSize: 9.5, fontWeight: 700, letterSpacing: "0.1em", color: C.cyan, border: `1px solid ${C.cyan}44`, borderRadius: 20, padding: "1px 8px" }}>LINK</span>}
                  {d.title}
                </div>
                {d.type === "link" && d.url && <a href={d.url} target="_blank" rel="noreferrer" style={{ ...mono, fontSize: 10.5, color: C.muted, textDecoration: "none", display: "inline-block", marginTop: 3, maxWidth: 420, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{d.url}</a>}
                <div style={{ ...mono, fontSize: 10, color: C.muted, marginTop: 3 }}>
                  {d.tags ? <span style={{ color: C.gold }}>{d.tags} · </span> : null}{wordCount(d.content).toLocaleString("en-ZA")} words · {new Date(d.addedAt).toLocaleDateString("en-ZA")}
                  {(() => { const u = docUsage(d); return u.n > 0 ? <span style={{ color: C.cyan }}> · used in {u.n} send{u.n === 1 ? "" : "s"}{u.w > 0 ? ` · ${u.w} won` : ""}</span> : null; })()}
                </div>
              </div>
              <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
                <select className="ssh-field" value={d.folder || ""} onChange={(e) => moveDoc(d.id, e.target.value)} title="Move to folder"
                  style={{ fontFamily: "'Inter', system-ui, sans-serif", background: C.fieldBg, border: `1px solid ${C.line}`, borderRadius: 8, color: C.muted, padding: "6px 8px", fontSize: 11.5, outline: "none", maxWidth: 140 }}>
                  <option value="">Unfiled</option>
                  {folders.map((f) => <option key={f} value={f}>{f}</option>)}
                </select>
                {d.type === "link" && <Btn small onClick={() => refreshLink(d)} disabled={refreshing === d.id}>{refreshing === d.id ? "…" : "↻"}</Btn>}
                <Btn small onClick={() => setExpanded(expanded === d.id ? null : d.id)}>{expanded === d.id ? "Collapse" : "Read"}</Btn>
                <Btn small kind="danger" onClick={() => remove(d.id)}>✕</Btn>
              </div>
            </div>
            <div style={{ fontSize: 12.5, color: C.muted, marginTop: 8, lineHeight: 1.6, whiteSpace: expanded === d.id ? "pre-wrap" : "normal", maxHeight: expanded === d.id ? 420 : "none", overflowY: expanded === d.id ? "auto" : "visible" }}>
              {expanded === d.id ? d.content : d.content.slice(0, 220) + (d.content.length > 220 ? "…" : "")}
            </div>
          </Card>
        ))}
      </div>
    </div>
  );
}

// ============ PLAYBOOK ============
function Playbook({ state, update }) {
  const [q, setQ] = useState("");
  const [chat, setChat] = useState([]);
  const [loading, setLoading] = useState(false);
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState(state.playbook);
  const bottomRef = useRef(null);
  useEffect(() => { if (bottomRef.current && typeof bottomRef.current.scrollIntoView === "function") bottomRef.current.scrollIntoView({ behavior: "smooth" }); }, [chat]);

  const ask = async () => {
    if (!q.trim() || loading) return;
    const question = q; setQ("");
    const history = [...chat, { role: "user", content: question }];
    setChat(history); setLoading(true);
    try {
      const docs = relevantDocs(state.documents, question, 2);
      const docContext = docs.length ? docs.map((d) => `--- ${d.title} ---\n${d.content.slice(0, 1500)}`).join("\n\n") : "";
      const text = await callClaude({
        maxTokens: 700, tier: "best",
        system: `You are Sentiv's sales coach. Answer from this playbook, any relevant uploaded documents below, plus general sales best practice. Be direct and practical, 2-6 sentences unless a script is asked for. If a relevant document exists but wasn't retrieved, say the agent can check the AI Brain.\n\nPLAYBOOK:\n${state.playbook}\n\nLIBRARY INDEX (titles only, may not all be retrieved):\n${libraryIndexText(state.documents)}${docContext ? `\n\nRETRIEVED DOCUMENT CONTENT:\n${docContext}` : ""}`,
        messages: history.slice(-8),
      });
      setChat([...history, { role: "assistant", content: text }]);
    } catch (e) {
      setChat([...history, { role: "assistant", content: "Something went wrong — ask again." }]);
    }
    setLoading(false);
  };

  return (
    <div style={{ maxWidth: 760 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
        <div style={{ ...disp, fontSize: 13, color: C.muted }}>Playbook & sales coach</div>
        <Btn small onClick={() => { setEditing(!editing); setDraft(state.playbook); }}>{editing ? "Cancel" : "Edit playbook"}</Btn>
      </div>
      {editing ? (
        <div>
          <TextArea rows={16} value={draft} onChange={setDraft} />
          <div style={{ marginTop: 8 }}><Btn kind="gold" onClick={() => { update({ playbook: draft }); setEditing(false); }}>Save playbook</Btn></div>
        </div>
      ) : (
        <div>
          <p style={{ fontSize: 13, color: C.muted, margin: "0 0 14px" }}>
            Ask anything — objections, qualifying questions, product fit. Answers come from the playbook and your library.
          </p>
          <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 14, padding: 14, minHeight: 120, maxHeight: 380, overflowY: "auto" }}>
            {chat.length === 0 && <div style={{ ...mono, fontSize: 11, color: C.muted }}>Try: "client says radios are old tech, what do I say?" or "qualifying questions for a mine visit"</div>}
            {chat.map((m, i) => (
              <div key={i} style={{ margin: "10px 0" }}>
                <div style={{ ...mono, fontSize: 10, letterSpacing: "0.13em", color: m.role === "user" ? C.muted : C.gold }}>{m.role === "user" ? "YOU" : "COACH"}</div>
                <div style={{ fontSize: 13, lineHeight: 1.65, whiteSpace: "pre-wrap" }}>{m.content}</div>
              </div>
            ))}
            {loading && <Spinner label="THINKING…" />}
            <div ref={bottomRef} />
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 10 }} onKeyDown={(e) => { if (e.key === "Enter") ask(); }}>
            <Input value={q} onChange={setQ} placeholder="Ask the coach…" style={{ flex: 1 }} />
            <Btn kind="gold" onClick={ask} disabled={loading}>Ask</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

</script>

<script>
(function () {
  var boot = document.getElementById("boot");
  var msg = document.getElementById("bootmsg");
  function fail(t) { if (msg) { msg.className = "err"; msg.textContent = t; } }
  function step(t) { if (msg) msg.textContent = t; }

  // Load a script, trying a primary URL then a fallback, calling done() on success.
  function loadScript(primary, fallback, done) {
    var s = document.createElement("script");
    s.src = primary; s.crossOrigin = "anonymous";
    s.onload = function () { done(true); };
    s.onerror = function () {
      if (!fallback) { done(false); return; }
      var s2 = document.createElement("script");
      s2.src = fallback; s2.crossOrigin = "anonymous";
      s2.onload = function () { done(true); };
      s2.onerror = function () { done(false); };
      document.head.appendChild(s2);
    };
    document.head.appendChild(s);
  }

  var CDN = {
    react:    ["https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js",        "https://unpkg.com/react@18.3.1/umd/react.production.min.js"],
    reactDom: ["https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js", "https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"],
    babel:    ["https://cdn.jsdelivr.net/npm/@babel/standalone@7.25.6/babel.min.js",           "https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"],
    mammoth:  ["https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js",             "https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.8.0/mammoth.browser.min.js"]
  };

  step("LOADING REACT…");
  loadScript(CDN.react[0], CDN.react[1], function (ok) {
    if (!ok || !window.React) return fail("Couldn't load React from either CDN. If you're on a restricted network, it may be blocking jsdelivr.net and unpkg.com — try another network or refresh.");
    step("LOADING REACT-DOM…");
    loadScript(CDN.reactDom[0], CDN.reactDom[1], function (ok) {
      if (!ok || !window.ReactDOM) return fail("Loaded React but not ReactDOM. Refresh; if it persists your network is blocking part of the CDN.");
      step("LOADING COMPILER…");
      loadScript(CDN.babel[0], CDN.babel[1], function (ok) {
        if (!ok || !window.Babel) return fail("Couldn't load the Babel compiler from either CDN. A network or ad-blocker is likely blocking jsdelivr.net and unpkg.com.");
        step("LOADING DOCUMENT ENGINE…");
        // mammoth is optional (DOCX parsing in AI Brain) — don't block the app if it fails.
        loadScript(CDN.mammoth[0], CDN.mammoth[1], function () {
          step("STARTING…");
          run();
        });
      });
    });
  });

  function run() {
    try {
      var src = document.getElementById("app-src").textContent;
      var compiled = window.Babel.transform(src, { presets: ["react"] }).code;
      // Expose React hooks + libs, then evaluate the compiled app in this scope.
      // Prefix the compiled code with all globals it needs — the safest way to inject
      // scope into an eval block without relying on var hoisting or strict-mode leakage.
      // No eval — use Function constructor with explicit named parameters.
      // This is the only approach that reliably injects scope in all browsers.
      var R = window.React;
      var RD = window.ReactDOM;
      var mm = window.mammoth || {};
      // eslint-disable-next-line no-eval
      // Build the function with all needed globals as named params, call it immediately.
      var appFn = new Function(
        "React","ReactDOM","mammoth",
        "useState","useEffect","useRef","useMemo","useCallback",
        compiled + "
;return SentivSalesHub;"
      );
      window.__SentivApp = appFn(
        R, RD, mm,
        R.useState, R.useEffect, R.useRef, R.useMemo, R.useCallback
      );
      var App = window.__SentivApp;
      if (typeof App !== "function") throw new Error("App component didn't define after compile.");
      ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
      window.__SENTIV_MOUNTED = true;
      if (boot) { boot.classList.add("gone"); setTimeout(function () { boot.remove(); }, 500); }
    } catch (e) {
      fail("The app compiled but failed to start: " + (e && e.message ? e.message : e));
      if (window.console) console.error(e);
    }
  }
})();
</script>
