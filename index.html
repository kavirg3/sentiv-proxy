// ============ ARCHITECTURE (owner only) — the holistic system view ============
// Everything the director needs to understand the platform at a glance: live health,
// architecture layers, the data flow, integration status, the data model, and roadmap.
function Architecture({ state, syncStatus, update, setOpenLead }) {
  const importRef = useRef(null);
  const [importMsg, setImportMsg] = useState("");
  const [openLayer, setOpenLayer] = useState(null);
  const [diag, setDiag] = useState(null);
  const [diagBusy, setDiagBusy] = useState(false);
  const [showGaps, setShowGaps] = useState(false);
  const [openNeed, setOpenNeed] = useState(null);
  const [logFrom, setLogFrom] = useState("");
  const leads = state.leads || [];
  const docs = state.documents || [];
  const partners = state.partners || [];
  const acts = leads.reduce((n, l) => n + ((l.activities || []).length), 0);
  const replies = leads.reduce((n, l) => n + (l.activities || []).filter((a) => a.replied || a.type === "reply").length, 0);
  const brainWords = docs.reduce((n, d) => n + (d.content || "").split(/\s+/).filter(Boolean).length, 0);
  const dataFilled = (() => {
    const fields = ["phone", "decisionMaker", "value", "vertical"];
    if (!leads.length) return 0;
    const filled = leads.reduce((n, l) => n + fields.filter((f) => l[f]).length, 0);
    return Math.round((filled / (leads.length * fields.length)) * 100);
  })();
  const backend = !!CONFIG.backendUrl;

  // Data-quality queue: turn the completeness % into a fixable list.
  const GAP_FIELDS = [["phone", "no phone"], ["decisionMaker", "no decision-maker"], ["value", "no deal value"], ["vertical", "no vertical"]];
  const gaps = leads.filter((l) => !l.stage.startsWith("Closed")).map((l) => ({ lead: l, missing: GAP_FIELDS.filter(([f]) => !l[f]).map(([, label]) => label) })).filter((g) => g.missing.length).sort((a, b) => b.missing.length - a.missing.length);

  // Diagnostics: ping the proxy and each integration route so "why isn't Call working?"
  // becomes a self-service answer instead of a support message.
  const runDiagnostics = async () => {
    setDiagBusy(true);
    const out = [];
    if (!CONFIG.backendUrl) {
      out.push({ name: "Backend proxy", ok: false, msg: "no backend URL — set it in Settings" });
      ["Euphoria", "VBOUT", "ManyReach", "RepliQ"].forEach((n) => out.push({ name: n, ok: false, msg: "unavailable without the backend" }));
    } else {
      try {
        const r = await fetch(`${CONFIG.backendUrl}/health`);
        if (r.ok) {
          const h = await r.json().catch(() => ({}));
          out.push({ name: "Backend proxy", ok: true, msg: h.corsAllows ? `healthy · allows ${Array.isArray(h.corsAllows) ? h.corsAllows.join(", ") : h.corsAllows}` : "healthy" });
        } else out.push({ name: "Backend proxy", ok: false, msg: `responded ${r.status} — is the URL right?` });
      } catch (e) {
        out.push({ name: "Backend proxy", ok: false, msg: `blocked: ${e.message || "fetch failed"} · called ${CONFIG.backendUrl}/health · if that opens fine in a browser tab, it's CORS → set ALLOWED_ORIGINS=* on Railway` });
      }
      // Probe each route with a deliberately incomplete body: 400 = route alive, 404 = route missing,
      // 500 "not configured" = route alive but the API key isn't set on the server.
      const probes = [["Euphoria", "euphoria-originate"], ["VBOUT", "vbout-contact"], ["ManyReach", "manyreach-enroll"], ["RepliQ", "repliq-generate"]];
      for (const [name, route] of probes) {
        try {
          const r = await fetch(`${CONFIG.backendUrl}/api/${route}`, { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" });
          const d = await r.json().catch(() => ({}));
          if (r.status === 404) out.push({ name, ok: false, msg: "route not deployed" });
          else if (r.status === 500 && /not configured/i.test(d.error || "")) out.push({ name, ok: false, msg: "API key not set on the server" });
          else out.push({ name, ok: true, msg: "route live, key present" });
        } catch (e) { out.push({ name, ok: false, msg: "unreachable" }); }
      }
    }
    // AI check last, prepended — never overwrite a slot (an earlier version clobbered the proxy row).
    let ai;
    try {
      await callClaude({ system: "Reply with OK.", messages: [{ role: "user", content: "ping" }], maxTokens: 5, tier: "fast" });
      ai = { name: "AI (Anthropic)", ok: true, msg: "responding" };
    } catch (e) { ai = { name: "AI (Anthropic)", ok: false, msg: e.message || "not responding" }; }
    out.unshift(ai);
    out.push({ name: "Saved data", ok: true, msg: hasWinStore() ? "in-app storage" : "browser storage (self-hosted) — data lives on this device" });
    out.push({ name: "Team database", ok: syncStatus === "live", msg: syncStatus === "live" ? "Supabase live sync" : syncStatus === "offline" ? "unreachable — working offline" : "this device only (no Supabase configured)" });
    setDiag(out);
    setDiagBusy(false);
  };

  // Full-state export: a real backup, and the file an accountant or analyst can work from.
  const exportState = () => {
    try {
      const payload = { exportedAt: new Date().toISOString(), app: "Sentiv Sales Hub", leads, partners, documents: docs.map((d) => ({ ...d, content: (d.content || "").slice(0, 2000) })), referrals: state.referrals || [], permissions: state.permissions || {}, targets: state.targets || {}, brainFolders: state.brainFolders || [] };
      const url = URL.createObjectURL(new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" }));
      const a = document.createElement("a");
      a.href = url; a.download = `sentiv-sales-hub-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    } catch (e) { /* browser blocked the download */ }
  };

  // Import/restore from an exported backup. Merge-safe: records are matched by id and the
  // newer updatedAt wins, so restoring never silently discards work done since the export.
  const onImport = async (e) => {
    const f = (e.target.files || [])[0];
    e.target.value = "";
    if (!f) return;
    try {
      const data = JSON.parse(await f.text());
      if (!data || (!Array.isArray(data.leads) && !Array.isArray(data.partners) && !Array.isArray(data.documents))) throw new Error("not a Sales Hub export");
      const merge = (cur, inc) => {
        const m = {};
        (cur || []).forEach((r) => { if (r && r.id) m[r.id] = r; });
        (inc || []).forEach((r) => {
          if (!r || !r.id) return;
          const ex = m[r.id];
          if (!ex || (Number(r.updatedAt) || 0) > (Number(ex.updatedAt) || 0)) m[r.id] = r;   // newer wins
        });
        return Object.values(m);
      };
      const patch = {
        leads: merge(leads, data.leads),
        partners: merge(partners, data.partners),
        documents: merge(docs, data.documents),
      };
      if (data.brainFolders) patch.brainFolders = Array.from(new Set([...(state.brainFolders || []), ...data.brainFolders]));
      if (data.permissions) patch.permissions = { ...(state.permissions || {}), ...data.permissions };
      if (data.targets) patch.targets = { ...(state.targets || {}), ...data.targets };
      update(patch);
      setImportMsg(`✓ Restored — ${patch.leads.length} leads, ${patch.partners.length} partners, ${patch.documents.length} documents (newer records kept)`);
    } catch (err) {
      setImportMsg(`✕ ${err.message || "couldn't read that file"} — pick a JSON file exported from this app`);
    }
    setTimeout(() => setImportMsg(""), 9000);
  };

  const INTEGRATIONS = [
    { name: "Anthropic (Claude)", role: "Lead scoring, drafts, briefs, AI Brain Q&A", on: true, note: "in-app; proxy fallback when self-hosted" },
    { name: "Supabase", role: "Team database — leads, partners, documents, settings", on: syncStatus === "live", note: syncStatus === "live" ? "live sync" : "this device only" },
    { name: "Euphoria", role: "Click-to-dial — rings your extension, then the client", on: backend, note: backend ? "via backend proxy" : "needs backend URL" },
    { name: "ManyReach", role: "Cold email sequences (campaign 98520)", on: backend, note: backend ? "via backend proxy" : "needs backend URL" },
    { name: "VBOUT", role: "Nurture + partner marketing (list 178932)", on: backend, note: backend ? "via backend proxy" : "needs backend URL" },
    { name: "RepliQ", role: "Personalised video / image outreach assets", on: backend, note: backend ? "via backend proxy" : "needs backend URL" },
  ];
  const LAYERS = [
    { icon: "▤", t: "Interface — what agents see", d: "Command queue, pipeline, outreach studio, call notes, partners",
      body: "Each agent gets a personal workspace: a priority Call Now queue ranked by heat score, a drag-and-drop pipeline, an AI outreach studio, and voice-to-text call notes. You get two extra surfaces — Team and this one. Works in any browser, phone or laptop, no install.",
      chips: ["Call queue", "Kanban pipeline", "Outreach studio", "Voice notes", "Owner analytics"] },
    { icon: "◇", t: "AI engine — Claude", d: "Scoring, drafting, research, document Q&A",
      body: "Four jobs: heat-scores every lead so agents call the right person first; drafts personalised email and WhatsApp grounded in your own documents; runs area sweeps to find new leads with web search; and answers questions from the AI Brain so nobody digs through PDFs.",

            </>
          );
        })()}
      </Card>
    </div>
  );
}

// ============ LEAD DRAWER ============
function LeadDrawer({ lead, close, upsertLead, removeLead, state, openOutreach }) {
  const [brief, setBrief] = useState(lead && lead.brief ? lead.brief : "");
  const [loadingBrief, setLoadingBrief] = useState(false);
  const [err, setErr] = useState("");
  if (!lead) return null;
  const hs = scoreLead(lead);
  const ext = state.euphoriaExt || "";

  const move = (dir) => {
    const i = STAGES.indexOf(lead.stage);
    const ni = Math.min(Math.max(i + dir, 0), STAGES.length - 1);
    upsertLead({ ...lead, stage: STAGES[ni], updatedAt: Date.now() });
  };
  const genBrief = async () => {
    setLoadingBrief(true); setErr("");
    try {
      const docs = relevantDocs(state.documents, lead.vertical + " " + lead.notes, 2);
      const docContext = docs.length ? docs.map((d) => `--- ${d.title} ---\n${d.content.slice(0, 1200)}`).join("\n\n") : "";
      const text = await callClaude({
        maxTokens: 1200, useSearch: true, tier: "best",
        system: "You are a sales intelligence analyst for Sentiv, a South African mission-critical communications and IoT company. Write concise, practical pre-meeting briefs. Use plain text with UPPERCASE section headers, no markdown symbols.",
        messages: [{ role: "user", content: `Prepare a pre-meeting brief on "${lead.company}" (${lead.vertical} vertical, South Africa). Research them online if possible. Sections: COMPANY SNAPSHOT, LIKELY COMMS & IOT PAIN POINTS, SENTIV PRODUCT FIT (from playbook: ${state.playbook.slice(0, 900)}${docContext ? `\n\nRelevant uploaded documents:\n${docContext}` : ""}), TALK TRACK (3 opening questions), RISKS. Keep it under 350 words. If you can't find the company online, base the brief on the vertical and say so.` }],
      });
      setBrief(text);
      upsertLead({ ...lead, brief: text, updatedAt: Date.now() });
    } catch (e) { setErr(e.message || "Brief generation failed — try again."); }
    setLoadingBrief(false);
  };

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(5,7,10,0.68)", backdropFilter: "blur(6px)", WebkitBackdropFilter: "blur(6px)", zIndex: 50, display: "flex", justifyContent: "flex-end" }} onClick={close}>
      <div className="ssh-glass ssh-drawer" style={{ width: "min(560px, 100%)", background: "rgba(14,17,22,0.9)", borderLeft: `1px solid ${C.line}`, boxShadow: "-24px 0 70px rgba(0,0,0,0.55)", height: "100%", overflowY: "auto", padding: 26 }} onClick={(e) => e.stopPropagation()}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start" }}>
          <div>
            <div style={{ ...disp, fontSize: 16 }}>{lead.company}</div>
            <div style={{ ...mono, fontSize: 11, color: C.muted, marginTop: 4 }}>{lead.contact || "no contact"} · {lead.vertical} · {fmtR(lead.value)}</div>
          </div>
          <Btn small onClick={close}>Close</Btn>
        </div>

        <div style={{ display: "flex", gap: 8, margin: "16px 0", alignItems: "center", flexWrap: "wrap" }}>
          <Btn small onClick={() => move(-1)}>◂ Stage</Btn>
          <span style={{ ...mono, fontSize: 11, color: STAGE_COLORS[lead.stage], letterSpacing: "0.12em", textTransform: "uppercase" }}>{lead.stage}</span>
          <Btn small onClick={() => move(1)}>Stage ▸</Btn>
          <Btn small kind="danger" onClick={() => removeLead(lead.id)}>Delete</Btn>
        </div>

        {!lead.stage.startsWith("Closed") && (
          <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 14px", borderRadius: 12, background: `${BAND_COLOR[hs.band]}14`, border: `1px solid ${BAND_COLOR[hs.band]}44`, marginBottom: 14, flexWrap: "wrap" }}>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", minWidth: 42 }}>
              <span style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 22, fontWeight: 700, color: BAND_COLOR[hs.band], lineHeight: 1 }}>{hs.score}</span>
              <span style={{ ...mono, fontSize: 9.5, letterSpacing: "0.14em", color: BAND_COLOR[hs.band], marginTop: 2 }}>{BAND_LABEL[hs.band]}</span>
            </div>
            <div style={{ flex: 1, minWidth: 150 }}>
              <div style={{ ...mono, fontSize: 10, color: C.gold }}>◷ Best time: {hs.bestTime}</div>
              {hs.reasons.length > 0 && <div style={{ ...mono, fontSize: 9.5, color: C.muted, marginTop: 4, lineHeight: 1.5 }}>{hs.reasons.join("  ·  ")}</div>}
            </div>
            <div style={{ display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" }}>
              <CallButton lead={lead} ext={ext} small onLog={(type, summary) => upsertLead(withActivity(lead, type, summary))} />
              <Btn small onClick={() => openOutreach(lead.id)}>Draft outreach</Btn>
              <BookButton small />
            </div>
          </div>
        )}

        <div className="ssh-grid2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
          <div><Label>Decision-maker</Label><Input value={lead.decisionMaker || ""} onChange={(v) => upsertLead({ ...lead, decisionMaker: v })} placeholder="Who signs off" /></div>
          <div><Label>Title / role</Label><Input value={lead.title || ""} onChange={(v) => upsertLead({ ...lead, title: v })} placeholder="e.g. Head of Ops" /></div>
          <div><Label>Direct line (for calls)</Label><Input value={lead.directLine || ""} onChange={(v) => upsertLead({ ...lead, directLine: v })} placeholder="011 000 0000" /></div>
          <div><Label>Company size</Label><Input value={lead.companySize || ""} onChange={(v) => upsertLead({ ...lead, companySize: v })} placeholder="e.g. 500+ / 3 mines" /></div>
        </div>
        <Label>Pain hook — the one reason they'd buy</Label>
        <Input value={lead.painHook || ""} onChange={(v) => upsertLead({ ...lead, painHook: v })} placeholder="e.g. radio blackspots underground shaft 4" style={{ marginBottom: 12 }} />
        <div className="ssh-grid2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
          <div>
            <Label>Next action</Label>
            <Input value={lead.nextAction || ""} onChange={(v) => upsertLead({ ...lead, nextAction: v })} placeholder="e.g. book site survey" />
          </div>
          <div>
            <Label>Follow up on</Label>
            <input className="ssh-field" type="date" value={lead.followUp || ""} onChange={(e) => upsertLead({ ...lead, followUp: e.target.value })}
              style={{ background: C.fieldBg, border: `1px solid ${followUpDue(lead) ? C.pink : C.line}`, borderRadius: 10, color: C.text, padding: "9px 13px", fontSize: 13, width: "100%", outline: "none", colorScheme: "dark" }} />
            {/* The cadence engine sets this automatically — say so, so it never feels like magic. */}
            {lead.cadence && <div style={{ ...mono, fontSize: 9.5, color: C.gold, marginTop: 5 }}>⚙ AUTO · {lead.cadence.rule}</div>}
          </div>
        </div>

        <div className="ssh-grid2" style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }}>
          <div>
            <Label>Deal value — once-off (R)</Label>
            <Input value={String(lead.value || "")} onChange={(v) => upsertLead({ ...lead, value: Number(String(v).replace(/[^\d]/g, "")) || 0 })} placeholder="0" />
          </div>
          <div>
            <Label>Recurring (R / month)</Label>
            <Input value={String(lead.recurringMonthly || "")} onChange={(v) => upsertLead({ ...lead, recurringMonthly: Number(String(v).replace(/[^\d]/g, "")) || 0 })} placeholder="e.g. PoC airtime, IoT subscription" />
          </div>
        </div>
        {Number(lead.recurringMonthly) > 0 && (
          <div style={{ ...mono, fontSize: 10.5, color: C.cyan, marginBottom: 12 }}>◈ {fmtR(Number(lead.recurringMonthly) * 12)} ARR if won — feeds the recurring book on the owner dashboard</div>
        )}

        {Number(lead.noAnswerStreak) >= RULES.noAnswerLimit && (
          <div style={{ ...mono, fontSize: 11, color: C.danger, border: `1px solid ${C.danger}44`, background: `${C.danger}10`, borderRadius: 10, padding: "8px 12px", marginBottom: 12 }}>
            ⚠ {lead.noAnswerStreak}× no answer — this deal is eating call time. Move it to a nurture sequence in Outreach.
          </div>
        )}

        <Label>Email</Label>
        <Input value={lead.email || ""} onChange={(v) => upsertLead({ ...lead, email: v })} placeholder="name@company.co.za" style={{ marginBottom: 12 }} />

        <Label>Website / LinkedIn URL {REPLIQ_ENABLED ? "· powers video personalization" : ""}</Label>
        <Input value={lead.website || ""} onChange={(v) => upsertLead({ ...lead, website: v })} placeholder="https://company.co.za" style={{ marginBottom: 12 }} />

        <Label>WhatsApp / phone number</Label>
        <Input value={lead.phone || ""} onChange={(v) => upsertLead({ ...lead, phone: v })} placeholder="082 123 4567" style={{ marginBottom: 12 }} />

        <Label>Notes</Label>
        <TextArea rows={3} value={lead.notes || ""} onChange={(v) => upsertLead({ ...lead, notes: v })} placeholder="Context, next steps…" />

        <div style={{ margin: "18px 0 8px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <Label>AI pre-meeting brief</Label>
          <Btn small kind="gold" onClick={genBrief} disabled={loadingBrief}>{brief ? "Refresh brief" : "Generate brief"}</Btn>
        </div>
        {loadingBrief && <Spinner label="RESEARCHING COMPANY…" />}
        {err && <div style={{ color: C.danger, fontSize: 12 }}>{err}</div>}
        {brief && <div style={{ background: C.ink, border: `1px solid ${C.line}`, borderRadius: 12, padding: 14, fontSize: 12.5, whiteSpace: "pre-wrap", lineHeight: 1.7, color: C.text }}>{brief}</div>}

        {lead.partnerName && (
          <div style={{ ...mono, fontSize: 11, color: C.gold, border: `1px solid ${C.gold}33`, background: `${C.gold}0D`, borderRadius: 10, padding: "8px 12px", marginTop: 14 }}>
            ◆ Referred by {lead.partnerName}{lead.partnerCode ? ` · ${lead.partnerCode}` : ""}{lead.stage === "Closed won" ? ` · partner cut ${fmtR((Number(lead.value) || 0) * PARTNER_RATE)}${Number(lead.recurringMonthly) > 0 ? ` + ${fmtR(Number(lead.recurringMonthly) * PARTNER_RATE)}/mo` : ""}` : ""}
          </div>
        )}

        {lead.stage === "Closed lost" && lead.lostReason && (
          <div style={{ ...mono, fontSize: 11.5, color: C.danger, border: `1px solid ${C.danger}44`, background: `${C.danger}10`, borderRadius: 10, padding: "8px 12px", marginTop: 14 }}>✕ LOST: {lead.lostReason}</div>
        )}

        {lead.activities && lead.activities.length > 0 && (
          <div style={{ marginTop: 18 }}>
            <Label>Activity log</Label>
            {lead.activities.map((a, i) => (
              <div key={i} style={{ borderLeft: `2px solid ${a.type === "reply" ? C.ok : C.gold}`, paddingLeft: 10, margin: "10px 0", fontSize: 12 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                  <span style={{ ...mono, fontSize: 10, color: C.muted }}>{a.type ? `${ACT_ICON[a.type] || "•"} ${a.type.toUpperCase()} · ` : ""}{new Date(a.at).toLocaleString("en-ZA", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" })}</span>
                  {REPLYABLE[a.type] && !a.replied && (
                    <button onClick={() => {
                      const acts = lead.activities.map((x, j) => (j === i ? { ...x, replied: true } : x));
                      upsertLead({ ...lead, updatedAt: Date.now(), lastReplyAt: Date.now(), activities: [{ at: Date.now(), type: "reply", summary: `Reply received — ${a.type}` }, ...acts] });
                    }} title="Mark that the prospect replied to this touch"
                      style={{ ...mono, fontSize: 9.5, fontWeight: 700, letterSpacing: "0.06em", padding: "2px 9px", borderRadius: 20, cursor: "pointer", border: `1px solid ${C.ok}55`, background: `${C.ok}10`, color: C.ok }}>✓ REPLY</button>
                  )}
                  {a.replied && <span style={{ ...mono, fontSize: 9.5, color: C.ok }}>↩ REPLIED</span>}
                </div>
                <div style={{ whiteSpace: "pre-wrap" }}>{a.summary}</div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ============ LEAD FINDER ============
function LeadFinder({ state, upsertLead, setTab, update, openOutreach }) {
  // Sweep results are expensive (20–40s of AI research), so they live in app
  // state — a tab switch or reload no longer throws the run away.
  const saved = state.finder || {};
  const [mode, setMode] = useState("sweep"); // sweep | import
  const [area, setArea] = useState(saved.area || "");
  const [vertical, setVertical] = useState(saved.vertical || "Mining");
  const [extra, setExtra] = useState("");
  const [loading, setLoading] = useState(false);
  const [results, setResults] = useState(saved.results || []);
  const [narrative, setNarrative] = useState(saved.narrative || "");
  const [err, setErr] = useState("");
  const [added, setAdded] = useState(saved.added || {});
  const [csv, setCsv] = useState("");
  const [importMsg, setImportMsg] = useState(null);
  const persistFinder = (patch) => update({ finder: { area, vertical, results, narrative, added, ...patch } });

  const SUGGESTIONS = [
    "Platinum mines within 100km of Rustenburg",
    "Armed response companies in East Rand with 50+ vehicles",
    "Cold-chain logistics depots around City Deep",
    "Private hospitals in Gauteng with multiple campuses",
    "Coal operations along the Mpumalanga N4 corridor",
    "Municipal traffic & EMS departments in Ekurhuleni",
  ];

  const runSweep = async (qOverride) => {
    const q = qOverride || `${vertical} companies in/around ${area}${extra ? " — " + extra : ""}`;
    if ((!area.trim() && !qOverride) || loading) return;
    setLoading(true); setErr(""); setResults([]); setNarrative(""); setAdded({});
    try {
      const text = await callClaude({
        maxTokens: 3000, useSearch: true, tier: "fast",
        system: `You are the lead-sourcing engine for Sentiv, a South African mission-critical communications & IoT company (two-way radio, PoC, control rooms, IoT telemetry, body-worn cameras). Research REAL South African companies using web search. Prefer genuine fit signals: large field workforces, vehicle fleets, multiple sites, coverage challenges, compliance needs. Extract as much CLOSE-USEFUL detail per company as you can verify: likely decision-maker role/name, switchboard number, website, scale (people/sites/fleet), and a concrete pain hook.`,
        messages: [{ role: "user", content: `Build a lead list: "${q}". After researching, respond with ONE short paragraph of market context, then ONLY a JSON array between <leads> and </leads>. Each item: {"company": string, "vertical": one of ${JSON.stringify(VERTICALS)}, "decision_maker": string (name if found, else role to target), "title": string, "phone": string (switchboard/direct, "" if unknown), "website": string, "company_size": string (e.g. "3 shafts, ±2,400 staff"), "pain_hook": string under 20 words (concrete, specific), "why_fit": string under 20 words, "estimated_value_zar": number}. 5 to 8 leads, REAL companies only — return fewer rather than invent.` }],
      });
      const jsonStr = extractTagged(text, "leads");
      const parsed = jsonStr ? parseJsonLoose(jsonStr) : parseJsonLoose(text);
      const pre = jsonStr ? text.slice(0, text.indexOf("<leads>")).trim() : "";
      setNarrative(pre);
      if (Array.isArray(parsed) && parsed.length) {
        setResults(parsed);
        persistFinder({ results: parsed, narrative: pre, added: {}, area: qOverride || area, vertical });
      }
      else setErr("Couldn't structure the list — tighten the area or try a suggestion below.");
    } catch (e) { setErr(e.message || "Sweep failed. Check your connection and try again."); }
    setLoading(false);
  };

  const addOne = (r, i) => {
    const cand = { company: r.company, contact: r.decision_maker || r.contact_hint || "", decisionMaker: r.decision_maker || "", title: r.title || "", phone: r.phone || "", website: r.website || "", companySize: r.company_size || "", painHook: r.pain_hook || "", vertical: VERTICALS.includes(r.vertical) ? r.vertical : "Other", value: Number(r.estimated_value_zar) || 0, notes: r.why_fit || "" };
    const dupe = findDupe(state.leads, cand);
    if (dupe) { upsertLead(mergeLead(dupe, cand)); return { id: dupe.id, mark: "merged" }; }
    const id = "L" + Date.now() + i;
    upsertLead({ id, ...cand, stage: "New", source: "platform", updatedAt: Date.now(), activities: [] });
    return { id, mark: "added" };
  };
  const addToPipeline = (r, i) => {
    const res = addOne(r, i);
    const nextAdded = { ...added, [i]: res.mark };
    setAdded(nextAdded); persistFinder({ added: nextAdded });
    return res.id;
  };
  // The one-click loop: source → pipeline → outreach studio, lead pre-seeded.
  const addAndDraft = (r, i) => { const id = addToPipeline(r, i); if (id && openOutreach) openOutreach(id); };
  const addAll = () => {
    const nextAdded = { ...added };
    results.forEach((r, i) => { if (nextAdded[i]) return; nextAdded[i] = addOne(r, i).mark; });
    setAdded(nextAdded); persistFinder({ added: nextAdded });
  };

  // CSV/paste import — works today, no backend. Dedupes row by row.
  const runImport = () => {
    const lines = csv.split(/\r?\n/).map((l) => l.trim()).filter(Boolean);
    if (!lines.length) return;
    let header = lines[0].toLowerCase().split(/[,;\t]/).map((h) => h.trim());
    const hasHeader = header.some((h) => ["company", "name", "phone", "email", "contact"].includes(h));
    const rows = hasHeader ? lines.slice(1) : lines;
    if (!hasHeader) header = ["company", "contact", "phone", "email"];
    const idx = (k) => header.findIndex((h) => h.includes(k));
    let addedN = 0, mergedN = 0;
    rows.forEach((row, i) => {
      const c = row.split(/[,;\t]/).map((x) => x.trim());
      const cand = { company: c[idx("company") > -1 ? idx("company") : 0] || "", contact: c[idx("contact")] || c[idx("name")] || "", phone: c[idx("phone")] || "", email: c[idx("email")] || "", website: c[idx("web")] || "", vertical, value: Number(c[idx("value")]) || 0, notes: "" };
      if (!cand.company) return;
      const dupe = findDupe(state.leads, cand);
      if (dupe) { upsertLead(mergeLead(dupe, cand)); mergedN++; }
      else { upsertLead({ id: "L" + Date.now() + "i" + i, ...cand, stage: "New", source: "platform", updatedAt: Date.now(), activities: [] }); addedN++; }
    });
    setImportMsg({ addedN, mergedN });
    setCsv("");
  };

  const seg = (id, label) => (
    <button onClick={() => setMode(id)} style={{ ...mono, fontSize: 11, fontWeight: 600, letterSpacing: "0.06em", textTransform: "uppercase", padding: "8px 16px", borderRadius: 10, cursor: "pointer", border: mode === id ? `1px solid ${C.gold}66` : "1px solid transparent", background: mode === id ? `${C.gold}1E` : "transparent", color: mode === id ? C.gold : C.muted }}>{label}</button>
  );

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end", flexWrap: "wrap", gap: 10, marginBottom: 14 }}>
        <div>
          <div style={{ ...disp, fontSize: 14, color: C.text }}>Find leads</div>
          <p style={{ fontSize: 13, color: C.muted, margin: "5px 0 0", maxWidth: 560, lineHeight: 1.6 }}>
            Pick an area and sector, get a researched list — decision-makers, numbers, deal sizes, pain hooks. Duplicates merge automatically.
          </p>
        </div>
        <div style={{ display: "flex", gap: 4, padding: 4, border: `1px solid ${C.line}`, borderRadius: 12, background: C.panel }}>
          {seg("sweep", "Area sweep")}{seg("import", "Import list")}
        </div>
      </div>

      {mode === "sweep" && (
        <>
          <Card style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr", gap: 12, alignItems: "end" }}>
            <div><Label>Area / region</Label><Input value={area} onChange={setArea} placeholder='e.g. "Rustenburg platinum belt" or "East Rand"' /></div>
            <div><Label>Sector</Label><Select value={vertical} onChange={setVertical} options={VERTICALS} /></div>
            <div style={{ gridColumn: "1 / -1" }}><Label>Sharpen it (optional)</Label><Input value={extra} onChange={setExtra} placeholder='e.g. "50+ vehicles", "multiple shafts", "24/7 control room"' /></div>
            <div style={{ gridColumn: "1 / -1", display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
              <Btn kind="gold" onClick={() => runSweep()} disabled={loading || !area.trim()}>Build lead list</Btn>
              <span style={{ ...mono, fontSize: 10.5, color: C.muted }}>Be specific — name mines, estates, fleets, campuses.</span>
            </div>
          </Card>

          <div style={{ display: "flex", gap: 8, flexWrap: "wrap", margin: "12px 0 4px" }}>
            {SUGGESTIONS.map((s) => (
              <button key={s} onClick={() => { setArea(s); runSweep(s); }} style={{ ...mono, fontSize: 10.5, color: C.muted, background: "rgba(255,255,255,0.04)", border: `1px solid ${C.line}`, borderRadius: 20, padding: "6px 13px", cursor: "pointer" }}>✦ {s}</button>
            ))}
          </div>

          {loading && <Spinner label="RESEARCHING — TAKES 20–40 SECONDS…" />}
          {err && <div style={{ color: C.danger, fontSize: 12, marginTop: 10 }}>{err}</div>}
          {narrative && <p style={{ fontSize: 12.5, color: C.muted, marginTop: 10, maxWidth: 700, lineHeight: 1.6 }}>{narrative}</p>}

          {results.length > 0 && (
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", margin: "14px 0 10px", flexWrap: "wrap", gap: 8 }}>
              <span style={{ ...mono, fontSize: 11.5, color: C.text }}>{results.length} found · {results.filter((_, i) => added[i]).length} in pipeline</span>
              <div style={{ display: "flex", gap: 8 }}>
                {Object.keys(added).length > 0 && <Btn small onClick={() => setTab("pipeline")}>Open pipeline ▸</Btn>}
                <Btn small kind="gold" onClick={addAll}>+ Add all</Btn>
              </div>
            </div>
          )}
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(300px, 1fr))", gap: 12 }}>
            {results.map((r, i) => {
              const dupe = !added[i] && findDupe(state.leads, { company: r.company, phone: r.phone });
              return (
                <Card key={i} style={{ display: "flex", flexDirection: "column", gap: 0 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", gap: 8, alignItems: "flex-start" }}>
                    <div style={{ fontSize: 14.5, fontWeight: 700, fontFamily: "'Space Grotesk', sans-serif" }}>{r.company}</div>
                    <span style={{ ...mono, fontSize: 11, color: C.gold, flexShrink: 0 }}>{fmtR(r.estimated_value_zar)}</span>
                  </div>
                  <div style={{ ...mono, fontSize: 10, color: C.muted, margin: "4px 0 10px" }}>{r.vertical}{r.company_size ? ` · ${r.company_size}` : ""}</div>
                  <div style={{ display: "grid", gap: 6, fontSize: 12, lineHeight: 1.5 }}>
                    <div><span style={{ ...mono, fontSize: 10, color: C.muted, letterSpacing: "0.1em" }}>TARGET </span><span style={{ color: C.text }}>{r.decision_maker || "—"}{r.title ? `, ${r.title}` : ""}</span></div>
                    {r.phone && <div><span style={{ ...mono, fontSize: 10, color: C.muted, letterSpacing: "0.1em" }}>PHONE </span><span style={{ ...mono, fontSize: 11.5, color: C.text }}>{r.phone}</span></div>}
                    <div><span style={{ ...mono, fontSize: 10, color: C.gold, letterSpacing: "0.1em" }}>HOOK </span><span style={{ color: C.text }}>{r.pain_hook || r.why_fit}</span></div>
                  </div>
                  <div style={{ marginTop: 12, display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                    <Btn small kind={added[i] ? "ghost" : "gold"} onClick={() => addToPipeline(r, i)} disabled={!!added[i]}>
                      {added[i] === "merged" ? "✓ Merged into existing" : added[i] ? "✓ In pipeline" : dupe ? "Merge into existing" : "+ Add to pipeline"}
                    </Btn>
                    {!added[i] && <Btn small onClick={() => addAndDraft(r, i)}>Add & draft ▸</Btn>}
                    {dupe && !added[i] && <span style={{ ...mono, fontSize: 10, color: C.pink }}>already tracked ({dupe.stage})</span>}
                  </div>
                </Card>
              );
            })}
          </div>
        </>
      )}

      {mode === "import" && (
        <Card style={{ maxWidth: 720 }}>
          <Label>Paste a list — CSV or one company per line</Label>
          <p style={{ fontSize: 12.5, color: C.muted, margin: "6px 0 10px", lineHeight: 1.6 }}>
            Columns: <span style={{ ...mono, fontSize: 11.5, color: C.text }}>company, contact, phone, email, website, value</span> — any order, header optional. Existing companies are enriched, never duplicated.
          </p>
          <TextArea rows={8} value={csv} onChange={setCsv} placeholder={"company,contact,phone,email\nImpala Platinum,J Mokoena,014 000 0000,ops@implats.co.za\nBidvest Protea Coin,,011 000 0000,"} />
          <div style={{ marginTop: 10, display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
            <Btn kind="gold" onClick={runImport} disabled={!csv.trim()}>Import into pipeline</Btn>
          </div>
          {importMsg && (
            <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap", marginTop: 10 }}>
              <span style={{ ...mono, fontSize: 11.5, color: C.ok }}>✓ {importMsg.addedN} added · {importMsg.mergedN} merged</span>
              <Btn small onClick={() => setTab("pipeline")}>Open pipeline ▸</Btn>
            </div>
          )}
        </Card>
      )}
    </div>
  );
}

// ============ ADMIN AUTOPILOT ============
function Autopilot({ state, upsertLead }) {
  const [leadId, setLeadId] = useState("");
  const [notes, setNotes] = useState("");
  const [loading, setLoading] = useState(false);
  const [out, setOut] = useState(null);
  const [err, setErr] = useState("");
  const [copied, setCopied] = useState(false);
  // Voice-to-text: Web Speech API (Chrome/Edge/Safari). Final results append to notes.
  const [dictating, setDictating] = useState(false);
  const [dictErr, setDictErr] = useState("");
  const recRef = useRef(null);
  useEffect(() => () => { try { recRef.current && recRef.current.stop(); } catch (e) {} }, []);
  const toggleDictation = () => {
    if (dictating) { try { recRef.current && recRef.current.stop(); } catch (e) {} setDictating(false); return; }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setDictErr("Voice input isn't supported in this browser — Chrome, Edge or Safari work."); return; }
    try {
      const rec = new SR();
      rec.lang = "en-ZA"; rec.continuous = true; rec.interimResults = false;
      rec.onresult = (ev) => {
        let txt = "";
        for (let i = ev.resultIndex; i < ev.results.length; i++) if (ev.results[i].isFinal) txt += ev.results[i][0].transcript + " ";
        if (txt.trim()) setNotes((n) => (n ? n.replace(/\s+$/, "") + " " : "") + txt.trim() + " ");
      };
      rec.onerror = (ev) => {
        setDictErr(ev.error === "not-allowed" || ev.error === "service-not-allowed"
          ? "Microphone blocked — allow mic access for this site and try again."
          : "Voice input hiccup — tap Dictate to resume.");
        setDictating(false);
      };
      rec.onend = () => setDictating(false); // browsers auto-stop on silence — reflect reality
      recRef.current = rec;
      setDictErr("");
      rec.start();
      setDictating(true);
    } catch (e) { setDictErr("Couldn't start voice input in this environment."); }
  };
  const leads = state.leads.filter((l) => !l.stage.startsWith("Closed"));
  const lead = state.leads.find((l) => l.id === leadId);
  const [applied, setApplied] = useState(false);

  const run = async () => {
    if (!notes.trim() || loading) return;
    setLoading(true); setErr(""); setOut(null); setCopied(false); setApplied(false);
    try {
      const text = await callClaude({
        maxTokens: 900, tier: "best",
        system: "You turn a sales agent's rough call notes into structured CRM output for Sentiv (SA mission-critical comms). Respond with ONLY a JSON object, no markdown, no preamble: {\"summary\": string (2-3 sentences), \"next_actions\": [string, ...max 4], \"suggested_stage\": one of " + JSON.stringify(STAGES) + ", \"follow_up_days\": number (how many days until the next touch, 1-14), \"follow_up_email\": {\"subject\": string, \"body\": string (professional, concise, South African business register, sign off as '" + (state.agentName || "the agent") + "')}}",
        messages: [{ role: "user", content: `Deal context: ${lead ? `${lead.company}, ${lead.vertical}, currently at stage "${lead.stage}". Existing notes: ${lead.notes}` : "No linked deal."}\n\nRaw call notes:\n${notes}` }],
      });
      const parsed = parseJsonLoose(text);
      if (!parsed || !parsed.summary) throw new Error("bad json");
      setOut(parsed);
      // Typed activity — an untyped one rendered with a blank icon and counted as nothing.
      if (lead) upsertLead(withActivity(lead, "note", parsed.summary));
    } catch (e) { setErr(e.message || "Couldn't process the notes — try again or add a bit more detail."); }
    setLoading(false);
  };

  const copyEmail = async () => {
    if (!out) return;
    (await copyText(`Subject: ${out.follow_up_email.subject}\n\n${out.follow_up_email.body}`)) ? setCopied(true) : setErr("Copy blocked in this view — select the text manually.");
  };

  return (
    <div style={{ maxWidth: 820 }}>
      <div style={{ ...disp, fontSize: 13, color: C.muted, marginBottom: 6 }}>Call notes</div>
      <p style={{ fontSize: 13, color: C.muted, margin: "0 0 14px" }}>
        Paste rough call notes. Get a CRM summary, next actions, and a follow-up email in seconds.
      </p>
      <div style={{ display: "grid", gap: 10 }}>
        <div>
          <Label>Link to deal (optional — logs to its activity trail)</Label>
          <select className="ssh-field" value={leadId} onChange={(e) => setLeadId(e.target.value)} style={{ fontFamily: "'Inter', system-ui, sans-serif", background: C.fieldBg, border: `1px solid ${C.line}`, borderRadius: 10, color: C.text, padding: "9px 10px", fontSize: 12, width: "100%", outline: "none" }}>
            <option value="">— none —</option>
            {leads.map((l) => <option key={l.id} value={l.id}>{l.company} ({l.stage})</option>)}
          </select>
        </div>
        <div>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, marginBottom: 4, flexWrap: "wrap" }}>
            <Label>Raw notes</Label>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              {dictating && <span style={{ display: "inline-flex", alignItems: "center", gap: 6 }}><span className="ssh-pulse" style={{ width: 8, height: 8, borderRadius: "50%", background: C.danger, display: "inline-block" }} /><span style={{ ...mono, fontSize: 10.5, color: C.danger }}>LISTENING</span></span>}
              <Btn small kind={dictating ? "danger" : "ghost"} onClick={toggleDictation}>{dictating ? "■ Stop" : "🎙 Dictate"}</Btn>
            </div>
          </div>
          {dictErr && <div style={{ fontFamily: "'Inter', system-ui, sans-serif", fontSize: 12, color: C.pink, marginBottom: 6 }}>{dictErr}</div>}
          <TextArea rows={6} value={notes} onChange={setNotes} placeholder="Speak or type — e.g. spoke to ops manager, 80 guards on duty phones, coverage dead spots at 2 sites, wants pricing for PoC pilot before month end, competitor quote from XYZ expires friday…" />
        </div>
        <div><Btn kind="gold" onClick={run} disabled={loading}>Process notes</Btn></div>
      </div>
      {loading && <Spinner label="STRUCTURING NOTES…" />}
      {err && <div style={{ color: C.danger, fontSize: 12, marginTop: 8 }}>{err}</div>}
      {out && (
        <div style={{ display: "grid", gap: 12, marginTop: 16 }}>
          <Card>
            <Label>CRM summary {leadId ? "· saved to deal" : ""}</Label>
            <div style={{ fontSize: 13, marginTop: 6, lineHeight: 1.6 }}>{out.summary}</div>
            {/* This used to be a dead label. One tap now moves the deal and books the next touch. */}
            {lead && out.suggested_stage && STAGES.includes(out.suggested_stage) && (
              <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap", marginTop: 12, paddingTop: 12, borderTop: `1px solid ${C.line}` }}>
                <span style={{ ...mono, fontSize: 10, color: C.muted, letterSpacing: "0.1em" }}>SUGGESTED</span>
                <span style={{ ...mono, fontSize: 11.5, color: STAGE_COLORS[out.suggested_stage] }}>{lead.stage} → {out.suggested_stage}</span>
                {out.follow_up_days > 0 && <span style={{ ...mono, fontSize: 10.5, color: C.muted }}>· follow up in {out.follow_up_days}d</span>}
                {applied ? (
                  <span style={{ ...mono, fontSize: 11, color: C.ok }}>✓ Applied</span>
                ) : (
                  <Btn small kind="gold" onClick={() => {
                    const days = Math.min(14, Math.max(1, Number(out.follow_up_days) || 0));
                    const base = out.suggested_stage === lead.stage
                      ? { ...lead }
                      : withActivity({ ...lead, stage: out.suggested_stage }, "stage", `Moved to ${out.suggested_stage} from call notes`);
                    // An explicit date from the AI overrides the stage cadence default.
                    upsertLead(days ? { ...base, followUp: addDays(null, days) } : base);
                    setApplied(true);
                  }}>Apply to deal</Btn>
                )}
              </div>
            )}
          </Card>
          <Card>
            <Label>Next actions</Label>
            <div style={{ marginTop: 6 }}>
              {out.next_actions.map((a, i) => <div key={i} style={{ fontSize: 13, padding: "4px 0", borderBottom: i < out.next_actions.length - 1 ? `1px solid ${C.line}` : "none" }}><span style={{ color: C.gold, ...mono }}>{String(i + 1).padStart(2, "0")}</span>  {a}</div>)}
            </div>
          </Card>
          <Card>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <Label>Follow-up email</Label>
              <Btn small onClick={copyEmail}>{copied ? "✓ Copied" : "Copy email"}</Btn>
            </div>
            <div style={{ fontSize: 13, fontWeight: 700, margin: "10px 0 6px" }}>{out.follow_up_email.subject}</div>
            <div style={{ fontSize: 13, whiteSpace: "pre-wrap", lineHeight: 1.7, color: C.text }}>{out.follow_up_email.body}</div>
          </Card>
        </div>
      )}
    </div>
  );
}

// ============ REFERRALS ============
const REF_STATUSES = ["Submitted", "Contacted", "In pipeline", "Closed won", "Lost"];
function Referrals({ state, update, upsertLead, setTab }) {
  const partners = state.partners || [];
  const [draft, setDraft] = useState({ name: "", phone: "", company: "", email: "" });
  const [emailEdit, setEmailEdit] = useState({});
  const [vbBusy, setVbBusy] = useState(null);
  const [vbMsg, setVbMsg] = useState({});
  const [leadFormFor, setLeadFormFor] = useState(null); // partner id with open referred-lead form
  const [leadDraft, setLeadDraft] = useState({ company: "", contact: "", phone: "", vertical: "Security", value: "", recurring: "" });
  const [confirmDel, setConfirmDel] = useState(null);
  const [justLogged, setJustLogged] = useState(null);
  const [copiedKit, setCopiedKit] = useState(null);
  const [showLegacy, setShowLegacy] = useState(false);
  const legacy = state.referrals || [];

  const makeCode = (name) => {
    const initials = name.trim().split(/\s+/).map((w) => w[0]).join("").toUpperCase().slice(0, 3) || "SP";
    let code;
    do { code = `SP-${initials}-${Math.floor(100 + Math.random() * 900)}`; } while (partners.some((p) => p.code === code));
    return code;
  };
  const addPartner = () => {
    if (!draft.name.trim()) return;
    const p = { id: "P" + Date.now(), name: draft.name.trim(), phone: draft.phone.trim(), company: draft.company.trim(), email: draft.email.trim(), code: makeCode(draft.name), createdAt: Date.now() };
    update({ partners: [p, ...partners] });
    setDraft({ name: "", phone: "", company: "", email: "" });
  };
  const removePartner = (id) => { update({ partners: partners.filter((p) => p.id !== id) }); setConfirmDel(null); };

  // The forwardable kit — partner keeps the top half, forwards the bottom half.
  const kitMsg = (p) => `Hi ${p.name.split(" ")[0]} — your Sentiv sales partner kit.

You earn *10% of every deal* you refer — once-off and recurring, paid on close. Your partner code: *${p.code}*

Forward the message below to anyone running mining, security, logistics, transport or utility operations:

————
We supply Hytera two-way radios, push-to-talk over cellular, body-worn cameras and IoT monitoring — installed and supported across South Africa by Sentiv. For a free site assessment, reply to whoever forwarded this and quote *${p.code}*.
————

Every deal that closes against your code pays you 10%. Let's go.`;
  const sendKit = (p) => {
    const msg = kitMsg(p);
    const num = toWaNumber(p.phone);
    const url = num ? `https://wa.me/${num}?text=${encodeURIComponent(msg)}` : `https://wa.me/?text=${encodeURIComponent(msg)}`;
    window.open(url, "_blank");
    if (p.email) {
      // mailto via location doesn't navigate away and isn't popup-blocked — both channels fire from one tap
      setTimeout(() => { try { window.location.href = `mailto:${p.email}?subject=${encodeURIComponent(`Your Sentiv sales partner kit — ${p.code}`)}&body=${encodeURIComponent(msg)}`; } catch (e) {} }, 550);
    }
  };
  const saveEmail = (p) => {
    const v = (emailEdit[p.id] || "").trim();
    if (!v) return;
    update({ partners: partners.map((x) => (x.id === p.id ? { ...x, email: v } : x)) });
    setEmailEdit({ ...emailEdit, [p.id]: "" });
  };
  const enrollVbout = async (p) => {
    if (!CONFIG.backendUrl) { setVbMsg({ ...vbMsg, [p.id]: { ok: false, t: "add backend URL in Settings" } }); return; }
    if (!p.email) { setVbMsg({ ...vbMsg, [p.id]: { ok: false, t: "add an email first" } }); return; }
    setVbBusy(p.id);
    try {
      const res = await fetch(`${CONFIG.backendUrl}/api/vbout-contact`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: p.email, firstName: p.name.split(" ")[0] || "", lastName: p.name.split(" ").slice(1).join(" ") || "", phone: p.phone || "", listId: VBOUT_NURTURE_LIST_ID, tags: ["sales-partner", p.code] }),
      });
      const d = await res.json();
      if (!res.ok) throw new Error(d.error || "enrolment failed");
      update({ partners: partners.map((x) => (x.id === p.id ? { ...x, vbouted: true } : x)) });
      setVbMsg({ ...vbMsg, [p.id]: { ok: true, t: "in the Vbout marketing list" } });
    } catch (e) { setVbMsg({ ...vbMsg, [p.id]: { ok: false, t: e.message || "enrolment failed" } }); }
    setVbBusy(null);
  };
  const copyKit = async (p) => {
    const ok = await copyText(kitMsg(p));
    setCopiedKit(ok ? p.id : "fail-" + p.id);
    setTimeout(() => setCopiedKit(null), 2600);
  };

  const logLead = (p) => {
    if (!leadDraft.company.trim()) return;
    upsertLead({
      id: "L" + Date.now(), company: leadDraft.company.trim(), contact: leadDraft.contact.trim(), phone: leadDraft.phone.trim(),
      vertical: leadDraft.vertical, value: Number(leadDraft.value) || 0, recurringMonthly: Number(leadDraft.recurring) || 0,
      stage: "New", source: "referral", partnerId: p.id, partnerName: p.name, partnerCode: p.code, updatedAt: Date.now(),
      activities: [{ at: Date.now(), type: "note", summary: `Referred by ${p.name} (${p.code})` }],
    });
    setLeadDraft({ company: "", contact: "", phone: "", vertical: "Security", value: "", recurring: "" });
    setLeadFormFor(null);
    setJustLogged(p.id); setTimeout(() => setJustLogged(null), 5000);
  };

  const statsFor = (p) => {
    const deals = state.leads.filter((l) => l.partnerId === p.id);
    const won = deals.filter((l) => l.stage === "Closed won");
    const pipeline = deals.filter((l) => l.stage !== "Closed won" && l.stage !== "Closed lost").reduce((s2, l) => s2 + (Number(l.value) || 0), 0);
    const wonVal = won.reduce((s2, l) => s2 + (Number(l.value) || 0), 0);
    const wonMrr = won.reduce((s2, l) => s2 + (Number(l.recurringMonthly) || 0), 0);
    return { deals: deals.length, pipeline, earned: wonVal * PARTNER_RATE, earnedMrr: wonMrr * PARTNER_RATE };
  };
  const ranked = [...partners].map((p) => ({ p, st: statsFor(p) })).sort((a, b) => b.st.earned - a.st.earned || b.st.pipeline - a.st.pipeline);
  const totals = ranked.reduce((t, { st }) => ({ pipeline: t.pipeline + st.pipeline, earned: t.earned + st.earned, mrr: t.mrr + st.earnedMrr }), { pipeline: 0, earned: 0, mrr: 0 });

  return (
    <div>
      <div style={{ ...disp, fontSize: 13, color: C.muted, marginBottom: 6 }}>Sales partners</div>
      <p style={{ fontSize: 13, color: C.muted, margin: "0 0 14px", maxWidth: 720, lineHeight: 1.6 }}>
        Recruit installers, consultants and industry contacts as Sentiv sales partners. Each gets a unique code and a WhatsApp kit to forward into their network. Every deal that closes against their code pays the partner <span style={{ color: C.gold, fontWeight: 600 }}>10% — once-off and recurring alike</span> — and lands in your pipeline as a referral.
      </p>

      {partners.length > 0 && (
        <div style={{ ...mono, fontSize: 11.5, color: C.muted, marginBottom: 14 }}>
          {partners.length} partner{partners.length === 1 ? "" : "s"} · referred pipeline <span style={{ color: C.text }}>{fmtR(totals.pipeline)}</span> · partner payouts <span style={{ color: C.gold }}>{fmtR(totals.earned)}{totals.mrr > 0 ? ` + ${fmtR(totals.mrr)}/mo` : ""}</span>
        </div>
      )}

      <Card style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 10, alignItems: "end", marginBottom: 18 }}>
        <div><Label>Partner name</Label><Input value={draft.name} onChange={(v) => setDraft({ ...draft, name: v })} placeholder="e.g. Sipho Ndlovu" /></div>
        <div><Label>WhatsApp number</Label><Input value={draft.phone} onChange={(v) => setDraft({ ...draft, phone: v })} placeholder="082 555 0000" /></div>
        <div><Label>Email — for Vbout marketing</Label><Input value={draft.email} onChange={(v) => setDraft({ ...draft, email: v })} placeholder="partner@company.co.za" /></div>
        <div><Label>Company / trade (optional)</Label><Input value={draft.company} onChange={(v) => setDraft({ ...draft, company: v })} placeholder="e.g. electrical contractor" /></div>
        <Btn kind="gold" onClick={addPartner}>Add partner</Btn>
      </Card>

      {partners.length === 0 && (
        <Card style={{ textAlign: "center", padding: 28 }}>
          <div style={{ ...disp, fontSize: 15 }}>Your network is your multiplier</div>
          <div style={{ fontSize: 13, color: C.muted, marginTop: 6, lineHeight: 1.7, maxWidth: 520, marginLeft: "auto", marginRight: "auto" }}>
            Think of the electricians, security installers, fleet managers and consultants already inside your customers' sites. Add the first one above — they get a code, you send the kit, their referrals become your deals.
          </div>
        </Card>
      )}

      {ranked.map(({ p, st }, idx) => (
        <div key={p.id} className="bhov" style={{ background: C.panel, border: `1px solid ${st.earned > 0 ? C.gold + "55" : C.line}`, borderRadius: 14, padding: 16, marginBottom: 10 }}>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 12, alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ minWidth: 200 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                {idx === 0 && st.earned > 0 && <span title="Top earner" style={{ color: C.gold, fontSize: 13 }}>★</span>}
                <span style={{ fontSize: 14, fontWeight: 600, fontFamily: "'Space Grotesk', system-ui, sans-serif" }}>{p.name}</span>
                <span style={{ ...mono, fontSize: 10.5, fontWeight: 700, color: C.gold, border: `1px solid ${C.gold}44`, background: `${C.gold}12`, borderRadius: 20, padding: "2px 9px" }}>{p.code}</span>
              </div>
              <div style={{ ...mono, fontSize: 10.5, color: C.muted, marginTop: 5 }}>
                {p.company ? p.company + " · " : ""}{p.email ? "" : ""}{st.deals} deal{st.deals === 1 ? "" : "s"} · pipeline {fmtR(st.pipeline)} · earned <span style={{ color: st.earned > 0 ? C.gold : C.muted }}>{fmtR(st.earned)}{st.earnedMrr > 0 ? ` + ${fmtR(st.earnedMrr)}/mo` : ""}</span>
              </div>
            </div>
            <div style={{ display: "flex", gap: 7, alignItems: "center", flexWrap: "wrap" }}>
              <Btn small kind="gold" onClick={() => sendKit(p)}>Send kit ▸</Btn>
              <Btn small onClick={() => enrollVbout(p)} disabled={vbBusy === p.id || p.vbouted}>{p.vbouted ? "✓ Vbout" : vbBusy === p.id ? "Enrolling…" : "❋ Vbout"}</Btn>
              <Btn small onClick={() => copyKit(p)}>{copiedKit === p.id ? "✓ Copied" : copiedKit === "fail-" + p.id ? "✗ Blocked here" : "Copy kit"}</Btn>
              <Btn small onClick={() => { setLeadFormFor(leadFormFor === p.id ? null : p.id); setConfirmDel(null); }}>{leadFormFor === p.id ? "Close" : "+ Referred lead"}</Btn>
              {confirmDel === p.id
                ? <Btn small kind="danger" onClick={() => removePartner(p.id)}>Confirm remove</Btn>
                : <Btn small onClick={() => { setConfirmDel(p.id); setLeadFormFor(null); }}>✕</Btn>}
            </div>
          </div>

          {vbMsg[p.id] && (
            <div style={{ ...mono, fontSize: 10.5, color: vbMsg[p.id].ok ? C.ok : C.danger, marginTop: 8 }}>{vbMsg[p.id].ok ? "✓" : "✕"} {vbMsg[p.id].t}</div>
          )}
          {!p.email && (
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginTop: 10, flexWrap: "wrap" }}>
              <span style={{ fontFamily: "'Inter', system-ui, sans-serif", fontSize: 12, color: C.muted }}>No email yet — needed for the email kit + Vbout marketing:</span>
              <Input value={emailEdit[p.id] || ""} onChange={(v) => setEmailEdit({ ...emailEdit, [p.id]: v })} placeholder="partner@company.co.za" style={{ maxWidth: "100%", width: 220, padding: "6px 10px", fontSize: 12 }} />
              <Btn small onClick={() => saveEmail(p)}>Save</Btn>
            </div>
          )}
          {justLogged === p.id && (
            <div style={{ display: "flex", gap: 10, alignItems: "center", marginTop: 12 }}>
              <span style={{ ...mono, fontSize: 11, color: C.ok }}>✓ In pipeline — tagged to {p.code}</span>
              <Btn small onClick={() => setTab("pipeline")}>View pipeline</Btn>
            </div>
          )}

          {leadFormFor === p.id && (
            <div className="ssh-grid2" style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 10, alignItems: "end", marginTop: 14, paddingTop: 14, borderTop: `1px solid ${C.line}` }}>
              <div><Label>Company</Label><Input value={leadDraft.company} onChange={(v) => setLeadDraft({ ...leadDraft, company: v })} placeholder="Prospect company" /></div>
              <div><Label>Contact</Label><Input value={leadDraft.contact} onChange={(v) => setLeadDraft({ ...leadDraft, contact: v })} placeholder="Name / role" /></div>
              <div><Label>Phone</Label><Input value={leadDraft.phone} onChange={(v) => setLeadDraft({ ...leadDraft, phone: v })} placeholder="011 555 0000" /></div>
              <div><Label>Vertical</Label><Select value={leadDraft.vertical} onChange={(v) => setLeadDraft({ ...leadDraft, vertical: v })} options={VERTICALS} /></div>
              <div><Label>Deal value (R)</Label><Input value={leadDraft.value} onChange={(v) => setLeadDraft({ ...leadDraft, value: v })} placeholder="0" /></div>
              <div><Label>Recurring (R/mo, optional)</Label><Input value={leadDraft.recurring} onChange={(v) => setLeadDraft({ ...leadDraft, recurring: v })} placeholder="0" /></div>
              <Btn kind="gold" onClick={() => logLead(p)}>Add to pipeline</Btn>
            </div>
          )}
        </div>
      ))}

      <div style={{ ...mono, fontSize: 10.5, color: C.muted, marginTop: 14 }}>◆ Partner cut is 10% of deal value on close · your agent commission applies on top, unchanged</div>

      {legacy.length > 0 && (
        <div style={{ marginTop: 22 }}>
          <button onClick={() => setShowLegacy(!showLegacy)} style={{ fontFamily: "'Inter', system-ui, sans-serif", background: "transparent", border: "none", color: C.muted, fontSize: 12.5, fontWeight: 600, cursor: "pointer", padding: 0 }}>
            {showLegacy ? "▾" : "▸"} Previously logged referrals ({legacy.length})
          </button>
          {showLegacy && legacy.map((r) => (
            <div key={r.id} style={{ background: C.panel, border: `1px solid ${r.status === "Closed won" ? C.ok : C.line}`, borderRadius: 14, padding: 14, margin: "10px 0", display: "flex", flexWrap: "wrap", gap: 12, alignItems: "center", justifyContent: "space-between" }}>
              <div style={{ minWidth: 180 }}>
                <div style={{ fontSize: 13, fontWeight: 700 }}>{r.company}</div>
                <div style={{ ...mono, fontSize: 10.5, color: C.muted }}>via {r.referrer} · {r.contact || "no contact"} · {new Date(r.createdAt).toLocaleDateString("en-ZA")}</div>
              </div>
              <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                <Input value={String(r.dealValue)} onChange={(v) => update({ referrals: legacy.map((x) => (x.id === r.id ? { ...x, dealValue: Number(v) || 0 } : x)) })} style={{ maxWidth: "100%", width: 110, padding: "6px 8px", fontSize: 12 }} />
                <select className="ssh-field" value={r.status} onChange={(e) => update({ referrals: legacy.map((x) => (x.id === r.id ? { ...x, status: e.target.value } : x)) })}
                  style={{ fontFamily: "'Inter', system-ui, sans-serif", background: C.fieldBg, border: `1px solid ${C.line}`, borderRadius: 8, color: r.status === "Closed won" ? C.ok : C.text, padding: "7px 8px", fontSize: 11, outline: "none" }}>
                  {REF_STATUSES.map((st2) => <option key={st2} value={st2}>{st2}</option>)}
                </select>
                {r.status === "Closed won" && <span style={{ ...mono, fontSize: 11, color: C.gold }}>YOUR CUT {fmtR(r.dealValue * COMMISSION_RATE)}</span>}
                <Btn small kind="danger" onClick={() => update({ referrals: legacy.filter((x) => x.id !== r.id) })}>✕</Btn>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ============ OUTREACH — real send via mailto: and wa.me, AI-drafted ============
function Outreach({ state, upsertLead, seedLeadId }) {
  const [leadId, setLeadId] = useState(seedLeadId && state.leads.some((l) => l.id === seedLeadId) ? seedLeadId : (state.leads[0] ? state.leads[0].id : ""));
  const [goal, setGoal] = useState("Follow up after our last conversation and propose next steps");
  const [loading, setLoading] = useState(false);
  const [draft, setDraft] = useState(null);
  const [err, setErr] = useState("");
  const [copiedEmail, setCopiedEmail] = useState(false);
  const [copiedWa, setCopiedWa] = useState(false);
  const lead = state.leads.find((l) => l.id === leadId);

  const generate = async () => {
    if (!lead || loading) return;
    setLoading(true); setErr(""); setDraft(null); setCopiedEmail(false); setCopiedWa(false);
    try {
      const docs = relevantDocs(state.documents, lead.vertical + " " + goal, 2);
      const docContext = docs.length ? docs.map((d) => `--- ${d.title} ---\n${d.content.slice(0, 900)}`).join("\n\n") : "";
      const rq = lead.repliqUrl
        ? `\n\nA personalized ${lead.repliqType || "video"} has been created for this prospect at: ${lead.repliqUrl}. Reference it naturally as a short personalized ${lead.repliqType || "video"} made just for them, and include the exact URL in BOTH the email body and the WhatsApp message.`
        : "";
      const text = await callClaude({
        maxTokens: 900, tier: "best",
        system: `You write outreach for a Sentiv sales agent (SA mission-critical comms & IoT). Respond with ONLY JSON: {"email": {"subject": string, "body": string}, "whatsapp": string}. Email: professional SA business register, under 180 words, sign off "${state.agentName || "the agent"}". WhatsApp: same intent but short (under 60 words), conversational, no subject line, fine to use 1 emoji max. Ground both in the playbook and any documents provided. Playbook:\n${state.playbook.slice(0, 1000)}${docContext ? `\n\nRelevant documents:\n${docContext}` : ""}`,
        messages: [{ role: "user", content: `Deal: ${lead.company}, contact ${lead.contact || "unknown"}, vertical ${lead.vertical}, stage ${lead.stage}. Notes: ${lead.notes || "none"}.\n\nGoal of this message: ${goal}${rq}` }],
      });
      const parsed = parseJsonLoose(text);
      if (!parsed || !parsed.email) throw new Error("bad json");
      parsed.grounded = docs.map((d) => d.title);
      // Safety net: guarantee the personalized link is present even if the model omitted it.
      if (lead.repliqUrl) {
        if (parsed.email && parsed.email.body && !parsed.email.body.includes(lead.repliqUrl)) {
          parsed.email.body += `\n\nHere's a short personalized ${lead.repliqType || "video"} I put together for you: ${lead.repliqUrl}`;
        }
        if (typeof parsed.whatsapp === "string" && !parsed.whatsapp.includes(lead.repliqUrl)) {
          parsed.whatsapp += `\n\nQuick personalized ${lead.repliqType || "video"} for you 👉 ${lead.repliqUrl}`;
        }
      }
      setDraft(parsed);
    } catch (e) { setErr(e.message || "Draft failed — try again or simplify the goal."); }
    setLoading(false);
  };

  const [sendingMR, setSendingMR] = useState(false);
  const [sendingVB, setSendingVB] = useState(false);
  const [mrResult, setMrResult] = useState(null);
  const [vbResult, setVbResult] = useState(null);
  const [sendingRQ, setSendingRQ] = useState(false);
  const [rqResult, setRqResult] = useState(null);
  const [rqManual, setRqManual] = useState("");
  const backendReady = !!CONFIG.backendUrl;
  const campaignId = lead ? MANYREACH_CAMPAIGNS[lead.vertical] : null;

  // RepliQ: generate a personalized asset via the backend proxy (key stays server-side).
  const generateRepliqAsset = async () => {
    if (!lead || !backendReady || !lead.website) return;
    setSendingRQ(true); setRqResult(null);
    try {
      const res = await fetch(`${CONFIG.backendUrl}/api/repliq-generate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          assetType: REPLIQ_ASSET_TYPE,
          firstName: (lead.contact || "").split(" ")[0] || "",
          lastName: (lead.contact || "").split(" ").slice(1).join(" ") || "",
          company: lead.company,
          website: lead.website,        // RepliQ uses this URL as the personalized background
          vertical: lead.vertical,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Generation failed");
      const url = data.url || data.assetUrl || data.videoUrl;
      if (!url) throw new Error("No asset URL returned");
      upsertLead({ ...lead, repliqUrl: url, repliqType: REPLIQ_ASSET_TYPE, updatedAt: Date.now() });
      setRqResult({ ok: true, msg: `Personalized ${REPLIQ_ASSET_TYPE} ready — it'll auto-embed in your drafts.` });
      logTouch("video", `Generated personalized ${REPLIQ_ASSET_TYPE}`);
    } catch (e) { setRqResult({ ok: false, msg: e.message || "Failed — check backend logs" }); }
    setSendingRQ(false);
  };

  // Manual path (works today, no backend): paste a URL you generated in RepliQ's dashboard.
  const attachRepliqManual = () => {
    if (!lead || !rqManual.trim()) return;
    upsertLead({ ...lead, repliqUrl: rqManual.trim(), repliqType: REPLIQ_ASSET_TYPE, updatedAt: Date.now() });
    setRqManual("");
    logTouch("video", "Personalized asset attached");
    setRqResult({ ok: true, msg: "Asset attached — it'll auto-embed in your drafts." });
  };
  const clearRepliq = () => { if (lead) { upsertLead({ ...lead, repliqUrl: "", repliqStats: null, updatedAt: Date.now() }); setRqResult(null); } };

  // RepliQ analytics: views / watch % / CTA clicks. Two ways to populate —
  // pull from the backend proxy, or type them in from the RepliQ dashboard (works now).
  const [sendingStats, setSendingStats] = useState(false);
  const refreshRepliqStats = async () => {
    if (!lead || !lead.repliqUrl || !backendReady) return;
    setSendingStats(true);
    try {
      const res = await fetch(`${CONFIG.backendUrl}/api/repliq-stats`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ assetUrl: lead.repliqUrl }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Stats fetch failed");
      const stats = {
        views: Number(data.views) || 0,
        watchPct: Number(data.watchPct) || 0,
        ctaClicks: Number(data.ctaClicks) || 0,
        checkedAt: Date.now(),
      };
      upsertLead({ ...lead, repliqStats: stats });
      setRqResult({ ok: true, msg: "Engagement stats updated." });
    } catch (e) { setRqResult({ ok: false, msg: e.message || "Couldn't fetch stats — check backend logs" }); }
    setSendingStats(false);
  };
  const setRepliqStat = (key, v) => {
    if (!lead) return;
    const prev = lead.repliqStats || { views: 0, watchPct: 0, ctaClicks: 0 };
    upsertLead({ ...lead, repliqStats: { ...prev, [key]: Number(v) || 0, checkedAt: Date.now() } });
  };

  const launchColdSequence = async () => {
    if (!lead || !backendReady) return;
    setSendingMR(true); setMrResult(null);
    try {
      const res = await fetch(`${CONFIG.backendUrl}/api/manyreach-enroll`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: lead.email || "", // add an email field to the lead if not already captured
          firstName: (lead.contact || "").split(" ")[0] || "",
          lastName: (lead.contact || "").split(" ").slice(1).join(" ") || "",
          company: lead.company,
          campaignId: campaignId,
          customFields: { vertical: lead.vertical, notes: lead.notes || "" },
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Enrollment failed");
      setMrResult({ ok: true, msg: "Enrolled in cold sequence" });
      logTouch("sequence", `Enrolled in cold sequence (campaign ${campaignId})`);
    } catch (e) { setMrResult({ ok: false, msg: e.message || "Failed to enroll — check backend logs" }); }
    setSendingMR(false);
  };

  const addToNurture = async () => {
    if (!lead || !backendReady) return;
    setSendingVB(true); setVbResult(null);
    try {
      const res = await fetch(`${CONFIG.backendUrl}/api/vbout-contact`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: lead.email || "",
          firstName: (lead.contact || "").split(" ")[0] || "",
          lastName: (lead.contact || "").split(" ").slice(1).join(" ") || "",
          phone: lead.phone || "",
          listId: VBOUT_NURTURE_LIST_ID,
          tags: [lead.vertical, lead.stage],
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Add to nurture failed");
      setVbResult({ ok: true, msg: "Added to nurture list" });
      logTouch("nurture", `Added to VBOUT nurture list ${VBOUT_NURTURE_LIST_ID}`);
    } catch (e) { setVbResult({ ok: false, msg: e.message || "Failed to add — check backend logs" }); }
    setSendingVB(false);
  };

  const [mailNote, setMailNote] = useState("");
  const copyEmail = async () => { (await copyText(`Subject: ${draft.email.subject}\n\n${draft.email.body}`)) ? setCopiedEmail(true) : setErr("Copy blocked in this view — use Open in Mail instead."); };
  const copyWa = async () => { (await copyText(draft.whatsapp)) ? setCopiedWa(true) : setErr("Copy blocked in this view — use Send on WhatsApp instead."); };
  const openMail = async () => {
    if (!draft) return;
    setMailNote("");
    // mailto: URLs silently truncate around ~2,000 chars in most clients — long AI
    // drafts arrive cut off. Past the threshold: copy the full body, open subject only.
    const full = `mailto:?subject=${encodeURIComponent(draft.email.subject)}&body=${encodeURIComponent(draft.email.body)}`;
    if (full.length > 1800) {
      try { await navigator.clipboard.writeText(draft.email.body); } catch (e) { /* copy button remains as fallback */ }
      window.open(`mailto:?subject=${encodeURIComponent(draft.email.subject)}`, "_blank");
      setMailNote("Long draft — the full body was copied to your clipboard. Paste it into the email (mail links truncate long text).");
    } else {
      window.open(full, "_blank");
    }
    logTouch("email", `Email opened in Mail — "${goal}"${draft && draft.grounded && draft.grounded.length ? ` · grounded in: ${draft.grounded.join(", ")}` : ""}`);
  };
  const openWa = () => {
    if (!draft || !lead) return;
    const num = toWaNumber(lead.phone);
    const url = num ? `https://wa.me/${num}?text=${encodeURIComponent(draft.whatsapp)}` : `https://wa.me/?text=${encodeURIComponent(draft.whatsapp)}`;
    window.open(url, "_blank");
    logTouch("whatsapp", `WhatsApp opened — "${goal}"${draft && draft.grounded && draft.grounded.length ? ` · grounded in: ${draft.grounded.join(", ")}` : ""}`);
  };
  // Outcome loop: reply rates computed live from the activity trail across all deals.
  const perf = (() => {
    const ch = { email: { sent: 0, rep: 0 }, whatsapp: { sent: 0, rep: 0 } };
    const byVert = {};
    state.leads.forEach((l) => (l.activities || []).forEach((a) => {
      if (a.type === "email" || a.type === "whatsapp") {
        ch[a.type].sent++; if (a.replied) ch[a.type].rep++;

// ============ LIBRARY — text-based doc storage the AI reads from ============
// PDF text extraction — pdf.js loads lazily from CDN only when a PDF is uploaded.
// IMPORTANT: browsers refuse cross-origin Workers, so we load the worker script as a
// plain <script> too; pdf.js then detects window.pdfjsWorker and parses on the main
// thread (its "fake worker" path) — no cross-origin Worker, no silent hang.
function loadScriptOnce(src, checkGlobal) {
  loadScriptOnce._m = loadScriptOnce._m || {};
  if (checkGlobal && typeof window !== "undefined" && window[checkGlobal]) return Promise.resolve();
  if (!loadScriptOnce._m[src]) {
    loadScriptOnce._m[src] = new Promise((resolve, reject) => {
      const sc = document.createElement("script");
      sc.src = src;
      sc.onload = () => resolve();
      sc.onerror = () => { delete loadScriptOnce._m[src]; reject(new Error("script blocked or offline")); };
      document.head.appendChild(sc);
    });
  }
  return loadScriptOnce._m[src];
}
const PDFJS_VER = "3.11.174";
async function loadPdfJs() {
  await loadScriptOnce(`https://cdnjs.cloudflare.com/ajax/libs/pdf.js/${PDFJS_VER}/pdf.min.js`, "pdfjsLib");
  await loadScriptOnce(`https://cdnjs.cloudflare.com/ajax/libs/pdf.js/${PDFJS_VER}/pdf.worker.min.js`, "pdfjsWorker");
  const lib = window.pdfjsLib;
  if (!lib) throw new Error("PDF reader couldn't load — network blocked");
  try { lib.GlobalWorkerOptions.workerSrc = `https://cdnjs.cloudflare.com/ajax/libs/pdf.js/${PDFJS_VER}/pdf.worker.min.js`; } catch (e) {}
  return lib;
}
const withTimeout = (p, ms, msg) => Promise.race([p, new Promise((_, rej) => setTimeout(() => rej(new Error(msg)), ms))]);
async function extractPdfText(file) {
  const lib = await withTimeout(loadPdfJs(), 15000, "PDF reader took too long to load — check connection and retry");
  const buf = await file.arrayBuffer();
  const doc = await withTimeout(lib.getDocument({ data: buf, isEvalSupported: false, disableFontFace: true }).promise, 30000, "PDF took too long to open — it may be corrupt or very large");
  let text = "";
  const pages = Math.min(doc.numPages, 60);
  for (let i = 1; i <= pages; i++) {
    const page = await doc.getPage(i);
    const tc = await page.getTextContent();
    text += tc.items.map((it) => it.str).join(" ") + "\n";
    if (text.length > 60000) break;
  }
  try { doc.destroy(); } catch (e) {}
  return text;
}
const stripHtml = (html) => html.replace(/<script[\s\S]*?<\/script>/gi, " ").replace(/<style[\s\S]*?<\/style>/gi, " ").replace(/<[^>]+>/g, " ").replace(/&nbsp;|&amp;|&lt;|&gt;|&quot;/g, " ").replace(/\s+/g, " ").trim();
