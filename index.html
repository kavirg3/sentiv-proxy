// Simple relevance matcher over the knowledge library (title/tags/content keyword overlap)
function relevantDocs(documents, queryText, max = 2) {
  if (!documents || !documents.length) return [];
  const q = (queryText || "").toLowerCase().split(/\W+/).filter((w) => w.length > 3);
  const scored = documents.map((d) => {
    const hay = (d.title + " " + (d.tags || "") + " " + (d.folder || "") + " " + d.content).toLowerCase();
    const score = q.reduce((s, w) => s + (hay.includes(w) ? 1 : 0), 0);
    return { d, score };
  }).sort((a, b) => b.score - a.score);
  return scored.filter((s) => s.score > 0).slice(0, max).map((s) => s.d);
}
function libraryIndexText(documents) {
  if (!documents || !documents.length) return "No documents uploaded yet.";
  return documents.map((d) => `- ${d.title} [${d.tags}]${d.folder ? ` (folder: ${d.folder})` : ""}`).join("\n");
}
// Clipboard with fallback — navigator.clipboard is often blocked in embedded previews,
// so fall back to a hidden textarea + execCommand before reporting failure.
async function copyText(t) {
  try { await navigator.clipboard.writeText(t); return true; }
  catch (e) {
    try {
      const ta = document.createElement("textarea");
      ta.value = t; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.focus(); ta.select();
      const ok = document.execCommand("copy");
      document.body.removeChild(ta);
      return ok;
    } catch (e2) { return false; }
  }
}

}

// ---- AUTH (Supabase email/password) ----
// The session token is what makes Row Level Security work: every leads request
// carries the signed-in agent's JWT, and the DATABASE decides what they can see.
// Only the refresh token is persisted; access tokens are re-minted on load.
const SESSION = { token: null, refresh: null, userId: null };
const authOn = () => !!SESSION.token;
function setSession(d) { SESSION.token = d.access_token || null; SESSION.refresh = d.refresh_token || null; SESSION.userId = d.user?.id || SESSION.userId; }
function clearSession() { SESSION.token = null; SESSION.refresh = null; SESSION.userId = null; }
async function authRequest(path, body) {
  const res = await fetch(`${CONFIG.supabaseUrl}/auth/v1/${path}`, {
    method: "POST",
    headers: { "apikey": CONFIG.supabaseKey, "Content-Type": "application/json" },
    body: JSON.stringify(body),
  });
  const d = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(d.error_description || d.msg || d.error || `auth failed (${res.status})`);
  return d;
}
const authSignIn = (email, password) => authRequest("token?grant_type=password", { email, password });

const authRefresh = (refresh_token) => authRequest("token?grant_type=refresh_token", { refresh_token });
// ---- Google OAuth (Supabase-hosted flow) ----
// Redirects to Google, then back to this app's URL with tokens in the hash.
// Needs the app on its own URL (deployed) — blocked inside sandboxed iframes.

}

function consumeOAuthHash() {
  if (typeof window === "undefined" || !window.location.hash.includes("access_token=")) return false;
  const p = new URLSearchParams(window.location.hash.slice(1));
  const at = p.get("access_token");

  return true;
}

// window.storage exists ONLY inside claude.ai. On a self-hosted deploy (Cloudflare,
// Railway, any static host) it is undefined — without this fallback NOTHING persists:
// settings, leads, partners and the AI Brain all vanish on every refresh.
const hasWinStore = () => typeof window !== "undefined" && window.storage && typeof window.storage.get === "function";
async function storeGet(k) {
  if (hasWinStore()) { try { const r = await window.storage.get(k); if (r && r.value) return r.value; } catch (e) { /* fall through */ } }
  try { return window.localStorage.getItem(k); } catch (e) { return null; }
}
async function storeSet(k, v) {
  if (hasWinStore()) { try { await window.storage.set(k, v); return true; } catch (e) { /* fall through */ } }
  try { window.localStorage.setItem(k, v); return true; } catch (e) { return false; }
}
// The AI Brain holds full extracted PDF text — hundreds of KB per document. Writing it
// back on every keystroke pushed the single blob towards the ~5MB localStorage quota,
// where the write fails SILENTLY and the day's leads are lost. Documents now live in
// their own key, written only when they actually change, and a failed write is surfaced.
const DOCS_KEY = "sentiv-hub-docs-v1";
let STORAGE_WARN = null;                       // last write error — the topbar reads this
const onStorageWarn = { fn: null };            // set by the app so a failure can raise a banner
function flagStorage(msg) {
  if (STORAGE_WARN === msg) return;
  STORAGE_WARN = msg;
  if (onStorageWarn.fn) onStorageWarn.fn(msg);
}
async function loadState() {
  try {
    const v = await storeGet(KEY);
    if (!v) return null;
    const core = JSON.parse(v);
    try {
      const d = await storeGet(DOCS_KEY);
      if (d) core.documents = JSON.parse(d);
    } catch (e) { /* docs unreadable — the rest of the app still loads */ }
    return core;
  } catch (e) { /* first run — nothing stored yet */ }
  return null;
}
// Two writes, each guarded. Core state (leads, partners, settings) is small and hot;
// documents are large and cold, so they only re-serialise when their JSON changes.
let _lastDocsJson = null;
async function saveState(state) {
  const { documents, ...core } = state || {};
  try {
    const ok = await storeSet(KEY, JSON.stringify(core));
    if (!ok) flagStorage("Local save failed — storage is full. Export from Architecture, then clear old AI Brain documents.");
    else if (STORAGE_WARN) flagStorage(null);
  } catch (e) { flagStorage("Local save failed — storage is full. Export from Architecture, then clear old AI Brain documents."); }
  try {
    const dj = JSON.stringify(documents || []);
    if (dj !== _lastDocsJson) {
      const ok = await storeSet(DOCS_KEY, dj);
      _lastDocsJson = ok ? dj : _lastDocsJson;
      if (!ok) flagStorage("AI Brain not saved — storage is full. Remove a large document and retry.");
    }
  } catch (e) { flagStorage("AI Brain not saved — storage is full. Remove a large document and retry."); }
}

// ============ CLAUDE API ============
// ── MODEL TIER ──────────────────────────────────────────────────────────────
// "best"  → Sonnet 4.6  — client-facing output, high-stakes structuring
// "fast"  → Haiku 4.5   — retrieval, extraction, template-style tasks (~10× cheaper)
// Rule of thumb: if the output is read by the client or moves a deal, use best.
const AI_BEST = "claude-sonnet-4-6";
const AI_FAST = "claude-haiku-4-5-20251001";

async function callClaude({ system, messages, useSearch = false, maxTokens = 1000, tier = "fast" }) {
  const body = {
    model: tier === "best" ? AI_BEST : AI_FAST,
    max_tokens: maxTokens,
    system,
    messages,
  };
  if (useSearch) body.tools = [{ type: "web_search_20250305", name: "web_search" }];
  // Direct call works inside claude.ai (the sandbox bridges it); anywhere else the direct
  // call is blocked by Anthropic's own CORS, so when hosted with a proxy configured we go
  // straight to the proxy and skip a guaranteed-failing round-trip that adds visible lag.
  const post = (url) => fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
  const hostedOutside = typeof window !== "undefined" && window.location && !/(^|\.)claude\.ai$/.test(window.location.hostname);
  const proxyFirst = hostedOutside && CONFIG.backendUrl;
  let res;
  try {
    res = await post(proxyFirst ? `${CONFIG.backendUrl}/api/anthropic` : "https://api.anthropic.com/v1/messages");
    if (!res.ok && !proxyFirst && CONFIG.backendUrl && (res.status === 401 || res.status === 403)) res = await post(`${CONFIG.backendUrl}/api/anthropic`);
  } catch (e) {
    if (CONFIG.backendUrl && !proxyFirst) {
      try { res = await post(`${CONFIG.backendUrl}/api/anthropic`); }
      catch (e2) { const err = new Error("No connection — check your network and retry."); err.kind = "network"; throw err; }
    } else { const err = new Error("No connection — check your network and retry."); err.kind = "network"; throw err; }
  }
  if (!res.ok) {
    const kind = res.status === 429 ? "rate" : res.status === 401 || res.status === 403 ? "auth" : res.status >= 500 ? "server" : "request";
    const msg = kind === "rate" ? "AI is rate-limited — wait ±30 seconds and retry."
      : kind === "auth" ? "AI access blocked for this deployment — check Settings / hosting."
      : kind === "server" ? "AI service hiccup — retry in a moment."
      : `AI request failed (${res.status}) — retry.`;
    const err = new Error(msg); err.kind = kind; throw err;
  }
  const data = await res.json();
  if (!data || !data.content) { const err = new Error("Empty response from AI — retry."); err.kind = "empty"; throw err; }
  return data.content.filter((b) => b.type === "text").map((b) => b.text).join("\n");
}
function extractTagged(text, tag) {
  const open = text.indexOf(`<${tag}>`);
  const close = text.indexOf(`</${tag}>`);
  if (open === -1 || close === -1) return null;
  return text.slice(open + tag.length + 2, close).trim();
}
function parseJsonLoose(text) {
  const clean = text.replace(/```json|```/g, "").trim();
  const a = clean.indexOf("["), b = clean.lastIndexOf("]");
  const o = clean.indexOf("{"), c = clean.lastIndexOf("}");
  try {
    if (a !== -1 && b > a && (o === -1 || a < o)) return JSON.parse(clean.slice(a, b + 1));
    if (o !== -1 && c > o) return JSON.parse(clean.slice(o, c + 1));
    return JSON.parse(clean);
  } catch (e) { return null; }
}

// ============ CADENCE ENGINE ============
// Nothing in this app used to happen unless somebody tapped something: follow-up dates
// were only ever set by hand. These rules fire on every state transition, so a deal that
// moves stage, or a call that goes unanswered, schedules its own next touch.
//
// One rule to remember: if the agent set a follow-up date themselves in this same edit,
// their date always wins. The engine only fills the gaps humans leave.
// The rules used to be hardcoded constants. They now live in owner settings and sync to
// the team, so the SLA clocks can be tuned per vertical without a code change — mining
// procurement moves at a very different pace to an armed-response contract.
const DEFAULT_CADENCE = {
  stages: { "New": 2, "Qualified": 3, "Site survey": 3, "Proposal": 3, "Negotiation": 1 },
  call: { noAnswer: 2, spoke: 3 },

  verticalPace: {},                 // vertical -> multiplier on the stage clock (1 = default)
};
// Mutable module-level rules, mirrored from state — same pattern as CONFIG.
const RULES = JSON.parse(JSON.stringify(DEFAULT_CADENCE));
function applyCadenceRules(r) {
  if (!r) return;
  const pos = (v, d) => (Number(v) > 0 ? Number(v) : d);
  RULES.stages = { ...DEFAULT_CADENCE.stages };
  Object.keys(r.stages || {}).forEach((k) => { RULES.stages[k] = pos(r.stages[k], DEFAULT_CADENCE.stages[k]); });
  RULES.call = { noAnswer: pos((r.call || {}).noAnswer, DEFAULT_CADENCE.call.noAnswer), spoke: pos((r.call || {}).spoke, DEFAULT_CADENCE.call.spoke) };
  RULES.noAnswerLimit = pos(r.noAnswerLimit, DEFAULT_CADENCE.noAnswerLimit);
  RULES.verticalPace = {};
  Object.keys(r.verticalPace || {}).forEach((k) => { if (Number(r.verticalPace[k]) > 0) RULES.verticalPace[k] = Number(r.verticalPace[k]); });

const paceFor = (vertical) => { const m = Number(RULES.verticalPace[vertical]); return m > 0 ? m : 1; };
const stageDays = (stage, vertical) => {

};

function newestActivity(lead) { return (lead && lead.activities && lead.activities[0]) || null; }

// prev = the lead as it was before this edit (undefined for a brand-new lead).
// Returns the lead with lifecycle stamps and any auto-scheduled follow-up applied.
function runAutomations(prev, next) {
  const l = { ...next };
  const stageChanged = !prev || prev.stage !== l.stage;
  const closed = (l.stage || "").startsWith("Closed");
  const userSetFollowUp = prev && prev.followUp !== l.followUp;   // agent picked a date — respect it

  // --- Lifecycle: closedAt is stamped ONCE, on the transition into a closed stage.
  // The forecast used to date deals by updatedAt, so editing an old won deal silently
  // re-dated it into the current quarter and inflated the number.
  if (closed && !l.closedAt) l.closedAt = Date.now();
  if (!closed && l.closedAt) l.closedAt = null;                   // reopened — un-stamp
  if (closed) { l.followUp = ""; l.cadence = null; return l; }    // closed deals stop nagging

  // --- Rule 1: entering a stage starts that stage's SLA clock.
  const sd = stageDays(l.stage, l.vertical);
  if (stageChanged && !userSetFollowUp && sd) {
    l.followUp = addDays(null, sd);
    l.cadence = { by: "stage", rule: `${l.stage} → +${sd}d${paceFor(l.vertical) !== 1 ? ` (${l.vertical} pace ×${paceFor(l.vertical)})` : ""}` };
    l.stageEnteredAt = Date.now();
  } else if (stageChanged) {
    l.stageEnteredAt = Date.now();
  }

  // --- Rule 2: a new call activity schedules the retry, and counts the misses.
  // Compare COUNT as well as timestamp: two activities logged inside the same millisecond
  // share an `at`, and a timestamp-only check silently ignored the second one.
  const a = newestActivity(l);
  const prevCount = (prev && prev.activities && prev.activities.length) || 0;
  const nextCount = (l.activities && l.activities.length) || 0;
  const isNewActivity = a && (!prev || nextCount > prevCount || !newestActivity(prev) || newestActivity(prev).at !== a.at);
  if (isNewActivity && a.type === "call") {
    const s = (a.summary || "").toLowerCase();
    if (s.includes("no answer")) {
      l.noAnswerStreak = (prev && prev.noAnswerStreak) || 0;
      l.noAnswerStreak += 1;
      if (!userSetFollowUp) {
        l.followUp = addDays(null, RULES.call.noAnswer);
        l.cadence = { by: "call", rule: `No answer ×${l.noAnswerStreak} → +${RULES.call.noAnswer}d` };
      }
      // Rule 2b: three misses and the deal stops eating call time — it goes to nurture.
      if (l.noAnswerStreak >= RULES.noAnswerLimit) l.nurtureCandidate = true;
    } else if (s.includes("spoke")) {
      l.noAnswerStreak = 0;
      l.nurtureCandidate = false;
      if (!userSetFollowUp) {
        l.followUp = addDays(null, RULES.call.spoke);
        l.cadence = { by: "call", rule: `Spoke → +${RULES.call.spoke}d` };
      }
    } else if (s.includes("not interested")) {
      l.noAnswerStreak = 0;
      if (!userSetFollowUp) { l.followUp = ""; l.cadence = null; }
    }
  }

  // --- Rule 3: a reply is the strongest buying signal there is. Call them TODAY.
  if (isNewActivity && a.type === "reply" && !userSetFollowUp) {
    l.followUp = today();
    l.cadence = { by: "reply", rule: "Reply received → call today" };

}

// ============ DEDUPE ENGINE — one company, one lead, always ============
const normCo = (s) => String(s || "").toLowerCase().replace(/\((pty|ltd|proprietary|limited)\)?/g, "").replace(/\b(pty|ltd|proprietary|limited|inc|cc|holdings|group|sa)\b/g, "").replace(/[^a-z0-9]/g, "").trim();

function findDupe(leads, cand) {
  const nc = normCo(cand.company);

  return leads.find((l) => (nc && normCo(l.company) === nc) || (np && np.length >= 9 && (normPhone(l.phone) === np || normPhone(l.directLine) === np))) || null;
}
// Cross-agent duplicate check. findDupe() above only sees the CURRENT agent's RLS-scoped

// This queries the shared table directly — but RLS still filters what comes back, so it
// needs a dedicated `company_registry` view (in the schema below) that every signed-in
// agent may READ but not see the deal details of: just company, owner and stage. Returns
// { conflict, ownerName, stage } or null. Fails open (returns null) when offline.
async function findTeamDupe(cand) {
  if (!teamOn() || !authOn()) return null;
  const nc = normCo(cand.company);
  if (!nc) return null;
  try {
    const rows = await sbFetch(`company_registry?select=company,owner_name,stage,norm_company&norm_company=eq.${encodeURIComponent(nc)}`, { headers: { "Prefer": "" }, method: "GET" });
    if (rows && rows.length) {
      const r = rows.find((x) => x.owner_id !== SESSION.userId) || rows[0];
      return { conflict: true, ownerName: r.owner_name || "another agent", stage: r.stage || "in pipeline", company: r.company };
    }

    case "Logistics": return "13:30–15:30 · post-dispatch lull";

  const v = Number(l.value) || 0;

  else if (v >= 1000000) { s += 16; r.push("7-figure deal"); }

// ============ MAIN APP ============
function SentivSalesHub() {
  const [state, setState] = useState(null);
  const [tab, setTab] = useState("pipeline");
  const [openLead, setOpenLead] = useState(null);
  const [outreachSeed, setOutreachSeed] = useState(null);
  const openOutreach = (leadId) => { setOutreachSeed(leadId); setOpenLead(null); setTab("outreach"); };
  const [showSettings, setShowSettings] = useState(false);
  // Soft-delete undo state — MUST be declared here with the other hooks, before the
  // loading/auth/role early-returns below, or React's hook order breaks on load.
  const [pendingDelete, setPendingDelete] = useState(null);
  const deleteTimer = useRef(null);
  // Sliding tab indicator — purely presentational; measures the active tab button.
  const navRef = useRef(null);
  const [navInd, setNavInd] = useState(null);
  useEffect(() => {
    const measure = () => {
      try {
        const el = navRef.current && navRef.current.querySelector(".ssh-tab.active");
        if (el && typeof el.offsetLeft === "number") setNavInd({ left: el.offsetLeft, width: el.offsetWidth });
        else setNavInd(null);
      } catch (e) { /* indicator is decorative — never let it break the app */ }
    };
    measure();
    const t = setTimeout(measure, 150); // re-measure after fonts settle
    window.addEventListener("resize", measure);
    return () => { clearTimeout(t); window.removeEventListener("resize", measure); };
  }, [tab, state && state.role]);
  // Team sync for partners, AI Brain documents, and owner settings: diff against the
  // last-pushed snapshot and push/delete only what changed. One effect covers every
  // mutation path in the app.
  const syncRef = useRef({ partners: {}, documents: {}, settings: "" });
  useEffect(() => {
    if (!state || !teamOn() || !authOn()) return;
    const t = setTimeout(() => {
      const diffPush = (table, arr) => {
        const prev = syncRef.current[table] || {};
        const next = {};
        (arr || []).forEach((row) => {
          if (!row || !row.id) return;
          const j = JSON.stringify(row);
          next[row.id] = j;
          if (prev[row.id] !== j) teamUpsertRow(table, row.id, row);
        });
        Object.keys(prev).forEach((id) => { if (!next[id]) teamDeleteRow(table, id); });
        syncRef.current[table] = next;
      };
      diffPush("partners", state.partners);
      diffPush("documents", state.documents);
      if (state.role === "owner") {
        const sj = JSON.stringify({ permissions: state.permissions || {}, targets: state.targets || {}, cadenceRules: state.cadenceRules || DEFAULT_CADENCE });
        if (syncRef.current.settings !== sj) { syncRef.current.settings = sj; teamSaveSettings(JSON.parse(sj)); }
      }
    }, 1200);
    return () => clearTimeout(t);
  }, [state && state.partners, state && state.documents, state && state.permissions, state && state.targets, state && state.cadenceRules, state && state.role]);

  // Mobile detection drives a real bottom tab bar (rendered structure, not CSS hacks).
  const [isMobile, setIsMobile] = useState(false);
  const [moreOpen, setMoreOpen] = useState(false);
  useEffect(() => {
    if (typeof window === "undefined" || !window.matchMedia) return;
    const mq = window.matchMedia("(max-width: 760px)");
    const apply = () => setIsMobile(!!mq.matches);
    apply();
    const add = mq.addEventListener ? mq.addEventListener.bind(mq, "change", apply) : mq.addListener && mq.addListener.bind(mq, apply);
    if (add) add();
    return () => {
      if (mq.removeEventListener) mq.removeEventListener("change", apply);
      else if (mq.removeListener) mq.removeListener(apply);
    };
  }, []);

  // Access control: if the owner revokes a tab an agent is on, land them safely on Command.
  useEffect(() => {
    if (!state || state.role !== "agent") return;
    const p = { ...DEFAULT_PERMS, ...(state.permissions || {}) };
    if (tab === "architecture" || tab === "team") { setTab("command"); return; }   // owner-only surfaces
    if (tab !== "command" && p[tab] === false) setTab("command");
  }, [tab, state]);

  // Called by AuthGate after a successful sign-in: load profile + RLS-scoped leads.
  const handleAuthed = async (d) => {
    setSession(d);
    setSyncStatus("connecting");
    try {
      const profile = await loadProfile();
      const rows = await teamLoadLeads();
      const [pRows, dRows, tset] = await Promise.all([
        teamLoadRows("partners").catch(() => []),
        teamLoadRows("documents").catch(() => []),
        teamLoadSettings(),
      ]);
      const mergeById = (local, remote) => { const m = {}; remote.forEach((r) => { if (r.data && r.data.id) m[r.data.id] = r.data; }); (local || []).forEach((l) => { if (!m[l.id]) m[l.id] = l; }); return Object.values(m); };
      setState((s) => ({
        ...s, session: { refresh: SESSION.refresh, userId: SESSION.userId }, role: profile.role, agentName: profile.full_name,
        leads: rows.map((r) => r.data).filter(Boolean),
        partners: mergeById(s.partners, pRows),
        documents: mergeById(s.documents, dRows),
        ...(tset ? { permissions: tset.permissions || s.permissions, targets: tset.targets || s.targets, cadenceRules: tset.cadenceRules || s.cadenceRules } : {}),
      }));
      setTab(profile.role === "owner" ? "team" : "command");
      setSyncStatus("live");
    } catch (e) { clearSession(); setSyncStatus("offline"); }
  };
  const signOut = () => {
    clearSession();
    setState((s) => ({ ...s, session: null, role: null, leads: [] })); // clear leads so the next user on this device sees nothing
    setSyncStatus(teamOn() ? "connecting" : "local");
  };
  // Owner dashboard: re-pull the whole team's pool on demand.
  const refreshTeam = async () => {
    if (!teamOn() || !authOn()) return;
    try { const rows = await teamLoadLeads(); setState((s) => ({ ...s, leads: rows.map((r) => r.data).filter(Boolean) })); setSyncStatus("live"); }
    catch (e) { setSyncStatus("offline"); }
  };

  // Save connections, then (re)try the team store with the new values.
  const saveSettings = async (settings) => {
    Object.assign(CONFIG, DEFAULT_CONNECTIONS, settings);
    setState((s) => ({ ...s, settings }));
    if (!teamOn()) { setSyncStatus("local"); return; }
    if (authOn()) { await refreshTeam(); return; }
    setSyncStatus("connecting"); // AuthGate will appear — sign in to go live
  };

  const [syncStatus, setSyncStatus] = useState(teamOn() ? "connecting" : "local");

  useEffect(() => {
    (async () => {
      const saved = await loadState();
      const init = saved || { leads: SEED_LEADS, referrals: [], partners: [], brainFolders: [], playbook: DEFAULT_PLAYBOOK, agentName: "Agent", documents: [], role: null, targets: { revenue: 500000 } };
      if (!init.targets) init.targets = { revenue: 500000 };
      Object.assign(CONFIG, DEFAULT_CONNECTIONS, init.settings || {});
      if (!init.cadenceRules) init.cadenceRules = JSON.parse(JSON.stringify(DEFAULT_CADENCE));
      applyCadenceRules(init.cadenceRules);
      setSyncStatus(teamOn() ? "connecting" : "local");
      // Team mode (Supabase + auth): restore the session, then the database is
      // the source of truth — RLS returns exactly what this user may see.
      if (teamOn()) {
        try {
          const fromOAuth = consumeOAuthHash(); // Google redirect lands here
          if (!fromOAuth && init.session?.refresh) {
            const d = await authRefresh(init.session.refresh);
            setSession(d);
          }
          if (authOn()) {
            init.session = { refresh: SESSION.refresh, userId: SESSION.userId };
            const profile = await loadProfile();
            init.role = profile.role;
            init.agentName = profile.full_name;
            const rows = await teamLoadLeads();
            init.leads = rows.map((r) => r.data).filter(Boolean);
            setSyncStatus("live");
          } else {
            init.role = null; // no session — AuthGate will handle sign-in
          }
        } catch (e) { clearSession(); init.session = null; init.role = null; setSyncStatus("offline"); }
      }
      setState(init);
      if (init.role) setTab(init.role === "owner" ? "team" : "command");
    })();
  }, []);
  // Debounced — a drawer edit fires on every keystroke, and serialising the whole state
  // that often was the single most expensive thing the app did.
  useEffect(() => {
    if (!state) return;
    const t = setTimeout(() => saveState(state), 400);
    return () => clearTimeout(t);
  }, [state]);
  // The cadence engine reads module-level RULES (like CONFIG). Mirror state into it the
  // moment the owner changes anything, or agents keep running yesterday's clocks.
  useEffect(() => { if (state && state.cadenceRules) applyCadenceRules(state.cadenceRules); }, [state && state.cadenceRules]);

  const [storageWarn, setStorageWarn] = useState(null);
  useEffect(() => { onStorageWarn.fn = setStorageWarn; return () => { onStorageWarn.fn = null; }; }, []);

  // One snapshot per calendar day. Costs ~60 bytes; buys you 90 days of trend on every
  // KPI, forever. Without it the whole app is a point-in-time photo with no history.
  useEffect(() => {
    if (!state || !state.leads) return;
    const d = today();
    const snaps = state.snapshots || [];
    if (snaps.length && snaps[snaps.length - 1].d === d) return;
    const open = state.leads.filter((l) => !l.stage.startsWith("Closed"));
    const snap = {
      d,
      pipeline: open.reduce((s, l) => s + (Number(l.value) || 0), 0),
      closed: state.leads.filter((l) => l.stage === "Closed won").reduce((s, l) => s + (Number(l.value) || 0), 0),
      deals: open.length,
      acts: state.leads.reduce((s, l) => s + (l.activities || []).filter((a) => Date.now() - a.at < 864e5).length, 0),
    };
    setState((s) => ({ ...s, snapshots: [...(s.snapshots || []), snap].slice(-90) }));
  }, [state && state.leads]);

  // KPI math — memoised so a keystroke anywhere doesn't re-sum every lead. HOOK-ORDER
  // RULE: this must live ABOVE the early returns below. On the very first render `state`
  // is null and the component bails out at the loading screen; if this hook sat after
  // that return, the hook count would grow once state loads — React error #310.
  const { commissionBase, commission, pipelineValue, platformSourced, weightedPipeline, coverage } = useMemo(() => {
    if (!state || !state.leads) return { commissionBase: 0, commission: 0, pipelineValue: 0, platformSourced: 0, weightedPipeline: 0, coverage: 0 };
    const won = state.leads.filter((l) => l.stage === "Closed won");
    const platformWon = won.filter((l) => l.source === "platform" || l.source === "referral");
    const refWon = (state.referrals || []).filter((r) => r.status === "Closed won");
    const cb = platformWon.reduce((s, l) => s + (Number(l.value) || 0), 0) + refWon.reduce((s, r) => s + (Number(r.dealValue) || 0), 0);
    const open = state.leads.filter((l) => !l.stage.startsWith("Closed"));
    const pv = open.reduce((s, l) => s + (Number(l.value) || 0), 0);
    const wp = open.reduce((s, l) => s + (Number(l.value) || 0) * (STAGE_WEIGHTS[l.stage] || 0), 0);
    const target = Number(state.targets && state.targets.revenue) || 500000;
    const wonQ = won.filter((l) => inThisQuarter(l.closedAt || l.updatedAt)).reduce((s, l) => s + (Number(l.value) || 0), 0);
    const remaining = Math.max(0, target - wonQ);
    return {
      commissionBase: cb,
      commission: cb * COMMISSION_RATE,
      pipelineValue: pv,
      platformSourced: state.leads.filter((l) => l.source === "platform").length,
      weightedPipeline: wp,
      coverage: remaining > 0 ? pv / remaining : Infinity,   // classic gap metric: pipeline ÷ what's left to sell
    };
  }, [state && state.leads, state && state.referrals, state && state.targets]);

  if (!state) return <div style={{ background: C.ink, minHeight: "100dvh", color: C.muted, ...mono, padding: 40 }}>LOADING CONSOLE…</div>;

  if (teamOn() && !authOn()) return (
    <>
      <AuthGate onAuthed={handleAuthed} openSettings={() => setShowSettings(true)} />
      {showSettings && <SettingsModal settings={state.settings || {}} syncStatus={syncStatus} close={() => setShowSettings(false)} save={saveSettings} />}
    </>
  );
  if (!state.role) return <RoleGate onChoose={(role, name) => { setState((s) => ({ ...s, role, agentName: name || (role === "owner" ? "Owner" : "Agent") })); setTab(role === "owner" ? "team" : "command"); }} />;

  const update = (patch) => setState((s) => ({ ...s, ...patch }));
  // Functional update — bulk paths (Add all, CSV import) call this in a loop, and a
  // precomputed patch from a stale closure would keep only the last lead.
  // Every mutation path in the app funnels through here — drag-drop, the drawer, the call
  // button, CSV import, the Finder. So the cadence engine runs in exactly one place, and
  // the previous version of the lead is read from the updater's own `s` (never a closure).
  const upsertLead = (lead) => {
    setState((s) => {
      const prev = s.leads.find((l) => l.id === lead.id);
      const next = runAutomations(prev, lead);
      if (teamOn()) queueTeamPush(next); // debounced per lead id — a repeat call just resets the timer
      return { ...s, leads: prev ? s.leads.map((l) => (l.id === next.id ? next : l)) : [next, ...s.leads] };
    });
  };

  // Soft delete: the lead leaves the board instantly, but the server-side delete
  // only commits after the undo window closes. One mis-tap is no longer fatal.
  const softDeleteLead = (id) => {
    const lead = state.leads.find((l) => l.id === id);
    if (!lead) return;
    clearTimeout(deleteTimer.current);
    if (pendingDelete && teamOn()) teamDeleteLead(pendingDelete.id); // commit any previous pending delete first
    setState((s) => ({ ...s, leads: s.leads.filter((l) => l.id !== id) }));
    setPendingDelete(lead);
    deleteTimer.current = setTimeout(() => { if (teamOn()) teamDeleteLead(id); setPendingDelete(null); }, 6000);
  };
  const undoDelete = () => {
    clearTimeout(deleteTimer.current);
    if (pendingDelete) setState((s) => ({ ...s, leads: [pendingDelete, ...s.leads] }));
    setPendingDelete(null);
  };

  const perms = { ...DEFAULT_PERMS, ...(state.permissions || {}) };
  // Mobile bottom bar: the four tabs that earn thumb-reach. Owner gets the command
  // surfaces (Team, Architecture); agents get their daily loop. AI Brain is a tab id
  // ("library") so it can sit in the bar like any other.
  const MOBILE_PRIMARY = state.role === "owner"
    ? ["team", "architecture", "pipeline", "library"]
    : ["command", "pipeline", "library", "outreach"];

// Count-up for formatted KPI strings ("R850,000", "3 leads"). Animates once on first
// mount; any parse failure or reduced-motion preference falls back to the static value.
function useCountUp(text) {
  const [out, setOut] = useState(text);
  const played = useRef(false);
  useEffect(() => {
    setOut(text);
    if (played.current) return;
    played.current = true;
    try {
      if (typeof window !== "undefined" && window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
      const m = String(text).match(/^([^\d]*)([\d\s,.\u00A0\u202F]+)(.*)$/);
      if (!m) return;
      // Compact figures carry decimals ("R2.34m") — stripping the point would count to 234.
      const raw = m[2].replace(/[\s,\u00A0\u202F]/g, "");
      const decimals = raw.includes(".") ? (raw.split(".")[1] || "").length : 0;
      const target = Number(raw);
      if (!isFinite(target) || target <= 0) return;
      const start = performance.now(), dur = 900;
      let raf;
      const step = (now) => {
        const p = Math.min(1, (now - start) / dur);
        const eased = 1 - Math.pow(1 - p, 3);
        const v = target * eased;
        setOut(m[1] + (decimals ? v.toFixed(decimals) : Math.round(v).toLocaleString("en-ZA")) + m[3]);
        if (p < 1) raf = requestAnimationFrame(step);
      };
      raf = requestAnimationFrame(step);
      return () => cancelAnimationFrame(raf);
    } catch (e) { setOut(text); }
  }, [text]);
  return out;
}
function Kpi({ label, value, gold, accent }) {
  const a = accent || (gold ? C.gold : C.violet);
  const shown = useCountUp(String(value));
  return (
    <div style={{ paddingLeft: 13, borderLeft: `2px solid ${a}` }}>
      <div style={{ fontFamily: "'Inter', system-ui, sans-serif", fontSize: 11, fontWeight: 500, color: C.muted }}>{label}</div>
      <div style={{ fontFamily: "'Space Grotesk', system-ui, sans-serif", fontSize: 19, fontWeight: 700, letterSpacing: "-0.01em", color: gold ? C.gold : C.text, marginTop: 3, fontVariantNumeric: "tabular-nums" }}>{shown}</div>
    </div>
  );
}

// ============ SETTINGS — connections, editable in-app ============
function SettingsModal({ settings, syncStatus, close, save }) {
  const [d, setD] = useState({ backendUrl: settings.backendUrl || "", supabaseUrl: settings.supabaseUrl || "", supabaseKey: settings.supabaseKey || "" });
  const [saving, setSaving] = useState(false);
  const apply = async () => {
    setSaving(true);
    // Normalise: strip trailing slashes and add https:// if the user pasted a bare domain
    // (a bare "host.up.railway.app" silently fails every fetch — easy mistake, hard to spot).
    const norm = (u) => { const t = (u || "").trim().replace(/\/+$/, ""); return t && !/^https?:\/\//i.test(t) ? "https://" + t : t; };
    await save({ backendUrl: norm(d.backendUrl), supabaseUrl: norm(d.supabaseUrl), supabaseKey: d.supabaseKey.trim() });
    setSaving(false);
    close();
  };
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(5,7,10,0.68)", backdropFilter: "blur(6px)", WebkitBackdropFilter: "blur(6px)", zIndex: 60, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }} onClick={close}>

        <Input value={d.backendUrl} onChange={(v) => setD({ ...d, backendUrl: v })} placeholder="https://sentiv-outreach.vercel.app" style={{ marginBottom: 14 }} />

// ============ SHARED DASH PRIMITIVES ============
function Bar({ pct, color }) {
  return (
    <div style={{ height: 7, background: "rgba(255,255,255,0.08)", borderRadius: 20, width: "100%", overflow: "hidden" }}>
      <div style={{ width: Math.min(100, Math.max(0, pct)) + "%", height: "100%", borderRadius: 20, background: color || C.gold, transition: "width .5s ease", boxShadow: `0 0 12px ${color || C.gold}55` }} />
    </div>
  );
}
function BigStat({ label, value, sub, gold }) {
  return (
    <Card style={{ display: "flex", flexDirection: "column", justifyContent: "space-between" }}>
      <Label>{label}</Label>
      <div style={{ ...disp, fontSize: 28, fontWeight: 700, letterSpacing: "-0.02em", fontVariantNumeric: "tabular-nums", color: gold ? C.gold : C.text, margin: "10px 0 5px", lineHeight: 1.05 }}>{value}</div>
      {sub && <div style={{ ...mono, fontSize: 10, color: C.muted, letterSpacing: "0.04em" }}>{sub}</div>}
    </Card>
  );
}
function computeBadges(state) {
  const won = state.leads.filter((l) => l.stage === "Closed won");
  const lost = state.leads.filter((l) => l.stage === "Closed lost");
  const wonValue = won.reduce((s, l) => s + (Number(l.value) || 0), 0);
  const platform = state.leads.filter((l) => l.source === "platform").length;
  const recentActs = state.leads.reduce((s, l) => s + (l.activities || []).filter((a) => Date.now() - a.at < 7 * 864e5).length, 0);
  const decided = won.length + lost.length;
  return [
    { id: "first", name: "FIRST DEAL", desc: "Close your first deal", earned: won.length >= 1 },
    { id: "rain", name: "RAINMAKER", desc: "R1m+ total closed", earned: wonValue >= 1000000 },
    { id: "prospect", name: "PROSPECTOR", desc: "10+ platform-sourced leads", earned: platform >= 10 },
    { id: "closer", name: "CLOSER", desc: "30%+ win rate (3+ decided)", earned: decided >= 3 && won.length / decided >= 0.3 },
    { id: "consistent", name: "OPERATOR", desc: "5+ activities this week", earned: recentActs >= 5 },
    { id: "referrer", name: "CONNECTOR", desc: "Log a referral", earned: (state.referrals || []).length >= 1 || (state.partners || []).length >= 1 },
  ];
}

// ============ AGENT DASHBOARD — bento command board ============
function AgentDashboard({ state, update, upsertLead, commission, commissionBase, pipelineValue, platformSourced, setTab, setOpenLead, openOutreach }) {
  const [editTarget, setEditTarget] = useState(false);
  const [targetDraft, setTargetDraft] = useState(String(state.targets?.revenue || 500000));
  const target = Number(state.targets?.revenue) || 500000;
  const won = state.leads.filter((l) => l.stage === "Closed won");
  const wonValue = won.reduce((s, l) => s + (Number(l.value) || 0), 0);
  const pct = target > 0 ? (wonValue / target) * 100 : 0;
  const stale = state.leads.filter((l) => !l.stage.startsWith("Closed") && daysAgo(l.updatedAt) >= 7);
  const recentActs = state.leads.reduce((s, l) => s + (l.activities || []).filter((a) => Date.now() - a.at < 7 * 864e5).length, 0);
  const badges = computeBadges(state);
  const earned = badges.filter((b) => b.earned).length;
  const openStages = STAGES.filter((s) => !s.startsWith("Closed"));
  const maxStage = Math.max(1, ...openStages.map((s) => state.leads.filter((l) => l.stage === s).length));

  // AI priority queue — score every open lead, surface the hottest to call now.
  // Memoised: this ran on every render, re-scoring the entire book each time.
  const ext = state.euphoriaExt || "";
  const ranked = useMemo(() => state.leads
    .filter((l) => !l.stage.startsWith("Closed"))
    .map((l) => ({ l, ...scoreLead(l) }))
    .sort((a, b) => b.score - a.score), [state.leads]);
  const hotCount = ranked.filter((x) => x.band === "hot").length;
  const dueCount = ranked.filter((x) => followUpDue(x.l)).length;
  const queue = ranked.slice(0, 6);

  // ---- Daily brief ----
  // The queue already knows who to call and when. This turns it into a message you can
  // send to yourself or the team on WhatsApp. NOTE: sending this automatically at 06:30
  // needs a scheduled job on the backend (a cron hitting /api/daily-brief) — the browser
  // can't wake itself up. This is the payload that job would send; today it's one tap.
  const [briefCopied, setBriefCopied] = useState(false);
  const buildBrief = () => {
    const lines = [`*Sentiv — today's calls* (${new Date().toLocaleDateString("en-ZA")})`, ""];
    queue.slice(0, 6).forEach((x, i) => {
      const who = x.l.decisionMaker || x.l.contact || "no contact yet";
      lines.push(`${i + 1}. *${x.l.company}* — ${fmtR(x.l.value)} · ${x.l.stage}`);
      lines.push(`   ${who} · ${x.bestTime}`);
      if (x.reasons.length) lines.push(`   _${x.reasons[0]}_`);
    });
    if (dueCount > 0) lines.push("", `⏰ ${dueCount} follow-up${dueCount === 1 ? "" : "s"} due today.`);
    if (stale.length > 0) lines.push(`❄ ${stale.length} deal${stale.length === 1 ? "" : "s"} going cold.`);
    return lines.join("\n");
  };
  const copyBrief = async () => {
    const ok = await copyText(buildBrief());
    if (ok) { setBriefCopied(true); setTimeout(() => setBriefCopied(false), 2500); }
  };
  const waBrief = () => {
    const url = `https://wa.me/?text=${encodeURIComponent(buildBrief())}`;
    if (typeof window !== "undefined") window.open(url, "_blank", "noopener");
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 10, marginBottom: 12 }}>
        <div style={{ ...disp, fontSize: 13, color: C.muted }}>Command — {state.agentName}</div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ ...mono, fontSize: 10, color: C.muted, letterSpacing: "0.1em" }}>PHONE EXT</span>
          <Input value={ext} onChange={(v) => update({ euphoriaExt: v })} placeholder="e.g. 108-Sentiv" style={{ maxWidth: "100%", width: 130, padding: "6px 9px", fontSize: 12 }} />
          <BookButton small label="Book meeting" />
        </div>
      </div>

      {/* ===== CALL NOW — AI priority queue ===== */}
      <Card className="ssh-rail" style={{ marginBottom: 12, padding: 0, overflow: "hidden" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 16px", borderBottom: `1px solid ${C.line}`, flexWrap: "wrap", gap: 8, background: "rgba(240,130,79,0.07)" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span className="ssh-pulse" style={{ width: 9, height: 9, borderRadius: "50%", background: BAND_COLOR.hot, boxShadow: `0 0 12px ${BAND_COLOR.hot}` }} />
            <span style={{ ...disp, fontSize: 13, color: C.text }}>Call now</span>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
            <span style={{ ...mono, fontSize: 10.5, color: C.muted }}>{dueCount > 0 && <span style={{ color: C.pink }}>{dueCount} follow-up{dueCount === 1 ? "" : "s"} due · </span>}{hotCount} hot of {ranked.length} open — hottest first</span>
            {queue.length > 0 && (
              <span style={{ display: "inline-flex", gap: 6 }}>
                <Btn small onClick={copyBrief}>{briefCopied ? "✓ Copied" : "Copy brief"}</Btn>
                <Btn small onClick={waBrief}>◉ WhatsApp</Btn>
              </span>
            )}
          </div>
        </div>
        {queue.length === 0 ? (
          <div style={{ padding: "26px 16px", textAlign: "center" }}>
            <div style={{ ...disp, fontSize: 15, color: C.text, marginBottom: 6 }}>Your call queue starts here</div>
            <div style={{ fontSize: 12.5, color: C.muted, marginBottom: 14 }}>Add a lead and the engine ranks it by value, heat and timing — hottest first, every morning.</div>
            <div style={{ display: "flex", gap: 8, justifyContent: "center", flexWrap: "wrap" }}>
              <Btn small kind="gold" onClick={() => setTab("finder")}>Find leads</Btn>
              <Btn small onClick={() => setTab("pipeline")}>Add to pipeline</Btn>
            </div>
          </div>
        ) : queue.map(({ l, score, band, reasons, bestTime }, i) => {
          const bc = BAND_COLOR[band];
          return (
            <div key={l.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 16px", borderBottom: i < queue.length - 1 ? `1px solid ${C.line}` : "none", flexWrap: "wrap" }}>
              <div style={{ display: "flex", flexDirection: "column", alignItems: "center", minWidth: 40 }}>
                <span style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 20, fontWeight: 700, color: bc, lineHeight: 1 }}>{score}</span>
                <span style={{ ...mono, fontSize: 9.5, letterSpacing: "0.14em", color: bc, marginTop: 2 }}>{BAND_LABEL[band]}</span>
              </div>
              <div style={{ flex: 1, minWidth: 180 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                  <span style={{ fontFamily: "'Space Grotesk', sans-serif", fontSize: 14, fontWeight: 600, color: C.text }}>{l.company}</span>
                  <span style={{ ...mono, fontSize: 10, color: STAGE_COLORS[l.stage] }}>{l.stage}</span>
                  <span style={{ ...mono, fontSize: 10, color: C.muted }}>· {fmtR(l.value)}</span>
                </div>
                <div style={{ ...mono, fontSize: 11, color: C.muted, marginTop: 3 }}>
                  {(l.decisionMaker || l.contact) ? <span style={{ color: C.text }}>{l.decisionMaker || l.contact}{l.title ? ` · ${l.title}` : ""}</span> : <span style={{ color: C.danger }}>no contact — add decision-maker</span>}
                </div>
                <div style={{ ...mono, fontSize: 10.5, color: C.gold, marginTop: 4 }}>◷ {bestTime}</div>
                {reasons.length > 0 && <div style={{ ...mono, fontSize: 11, color: C.muted, marginTop: 4, lineHeight: 1.5 }}>{reasons.join("  ·  ")}</div>}
                {followUpDue(l) && (
                  <div style={{ display: "flex", gap: 6, alignItems: "center", marginTop: 6 }}>
                    <span style={{ ...mono, fontSize: 10, color: C.pink, letterSpacing: "0.08em" }}>SNOOZE</span>
                    <button onClick={() => upsertLead({ ...l, followUp: addDays(null, 1) })} style={{ ...mono, fontSize: 10.5, padding: "3px 10px", borderRadius: 20, cursor: "pointer", border: `1px solid ${C.line}`, background: "transparent", color: C.muted }}>+1d</button>
                    <button onClick={() => upsertLead({ ...l, followUp: addDays(null, 7) })} style={{ ...mono, fontSize: 10.5, padding: "3px 10px", borderRadius: 20, cursor: "pointer", border: `1px solid ${C.line}`, background: "transparent", color: C.muted }}>+1w</button>
                  </div>
                )}
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 6, alignItems: "flex-end" }}>
                <CallButton lead={l} ext={ext} small onLog={(type, summary) => upsertLead(withActivity(l, type, summary))} />
                <div style={{ display: "flex", gap: 6 }}>
                  <Btn small onClick={() => openOutreach(l.id)}>Draft</Btn>
                  <Btn small onClick={() => setOpenLead(l.id)}>Open</Btn>
                </div>
              </div>
            </div>
          );
        })}
      </Card>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(240px, 1fr))", gap: 14 }}>

        {/* Target board — spans wide */}
        <Card style={{ gridColumn: "1 / -1", display: "flex", flexDirection: "column", gap: 10 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
            <Label>Target board — closed revenue vs target</Label>
            {editTarget ? (
              <div style={{ display: "flex", gap: 6 }}>
                <Input value={targetDraft} onChange={setTargetDraft} style={{ maxWidth: "100%", width: 130, padding: "5px 8px", fontSize: 12 }} />
                <Btn small kind="gold" onClick={() => { update({ targets: { ...state.targets, revenue: Number(targetDraft) || target } }); setEditTarget(false); }}>Set</Btn>
              </div>
            ) : (
              <Btn small onClick={() => { setTargetDraft(String(target)); setEditTarget(true); }}>Edit target</Btn>
            )}
          </div>
          <div style={{ display: "flex", alignItems: "baseline", gap: 10, flexWrap: "wrap" }}>
            <span style={{ ...mono, fontSize: 30, fontWeight: 700, color: pct >= 100 ? C.ok : C.gold }}>{fmtR(wonValue)}</span>
            <span style={{ ...mono, fontSize: 13, color: C.muted }}>of {fmtR(target)} · {Math.round(pct)}%</span>
          </div>
          <Bar pct={pct} color={pct >= 100 ? C.ok : C.gold} />
        </Card>

        <BigStat label="Your 10% commission" value={fmtR(commission)} sub={`on ${fmtR(commissionBase)} attributed`} gold />
        <BigStat label="Open pipeline" value={fmtR(pipelineValue)} sub={`${state.leads.filter((l) => !l.stage.startsWith("Closed")).length} active deals`} />
        <BigStat label="Platform-sourced" value={String(platformSourced)} sub="leads found by AI" />
        <BigStat label="Momentum" value={`${recentActs}`} sub="activities in last 7 days" gold={recentActs >= 5} />

        {/* Badges */}
        <Card style={{ gridColumn: "span 2" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <Label>Achievements</Label>
            <span style={{ ...mono, fontSize: 10, color: C.gold }}>{earned}/{badges.length}</span>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(120px, 1fr))", gap: 8, marginTop: 10 }}>
            {badges.map((b) => (
              <div key={b.id} title={b.desc} style={{ border: `1px solid ${b.earned ? C.gold : C.line}`, padding: "8px 10px", opacity: b.earned ? 1 : 0.45, background: b.earned ? C.panel2 : "transparent" }}>
                <div style={{ ...mono, fontSize: 10, letterSpacing: "0.12em", color: b.earned ? C.gold : C.muted, fontWeight: 700 }}>{b.earned ? "◆ " : "◇ "}{b.name}</div>
                <div style={{ fontSize: 10, color: C.muted, marginTop: 3, lineHeight: 1.4 }}>{b.desc}</div>
              </div>
            ))}
          </div>
        </Card>

        {/* Funnel */}
        <Card style={{ gridColumn: "span 2" }}>
          <Label>Pipeline funnel</Label>
          <div style={{ marginTop: 10, display: "grid", gap: 8 }}>
            {openStages.map((s) => {
              const n = state.leads.filter((l) => l.stage === s).length;
              return (
                <div key={s} style={{ display: "grid", gridTemplateColumns: "90px 1fr 24px", gap: 8, alignItems: "center" }}>
                  <span style={{ ...mono, fontSize: 9.5, color: C.muted, letterSpacing: "0.08em", textTransform: "uppercase" }}>{s}</span>
                  <Bar pct={(n / maxStage) * 100} color={STAGE_COLORS[s]} />
                  <span style={{ ...mono, fontSize: 11, color: C.text, textAlign: "right" }}>{n}</span>
                </div>
              );
            })}
          </div>
        </Card>

        {/* Stale deals */}
        <Card style={{ gridColumn: "span 2", borderColor: stale.length ? C.danger : C.line }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <Label>Deals going cold</Label>
            <Btn small onClick={() => setTab("pipeline")}>Open pipeline</Btn>
          </div>
          {stale.length === 0 ? (
            <div style={{ ...mono, fontSize: 11, color: C.ok, marginTop: 10 }}>Nothing stale — every deal touched in the last 7 days.</div>
          ) : stale.slice(0, 3).map((l) => (
            <div key={l.id} style={{ display: "flex", justifyContent: "space-between", borderBottom: `1px solid ${C.line}`, padding: "8px 0", gap: 8 }}>
              <div style={{ fontSize: 12.5, fontWeight: 600 }}>{l.company}</div>
              <div style={{ ...mono, fontSize: 10, color: C.danger }}>{daysAgo(l.updatedAt)}D SILENT · {fmtR(l.value)}</div>
            </div>
          ))}
        </Card>
      </div>
    </div>
  );
}

// ============ DIRECTOR METRICS ENGINE ============
// Every number below is derived from data the app ALREADY stores — the timestamped stage
// changes in each lead's activity trail. None of it needed a new field; it just was never
// computed. Velocity and conversion are what a director actually runs on.

// Reconstruct a lead's stage history from its activity trail.
function stageHistory(lead) {
  const acts = [...(lead.activities || [])].sort((a, b) => a.at - b.at);
  const born = acts.length ? acts[0].at : (lead.updatedAt || Date.now());
  const path = [{ stage: "New", at: born }];
  acts.forEach((a) => {
    if (a.type !== "stage") return;
    const m = /Moved to (.+)$/.exec(a.summary || "") || /Closed lost: /.test(a.summary || "") && ["", "Closed lost"];
    const st = m && m[1];
    if (st && STAGES.includes(st) && st !== path[path.length - 1].stage) path.push({ stage: st, at: a.at });
  });
  // Trust the lead's current stage even if the trail is incomplete (imports, legacy rows).
  if (path[path.length - 1].stage !== lead.stage && STAGES.includes(lead.stage)) {
    path.push({ stage: lead.stage, at: lead.closedAt || lead.updatedAt || Date.now() });
  }
  return { born, path };
}

function directorMetrics(leads) {
  const open = leads.filter((l) => !l.stage.startsWith("Closed"));
  const won = leads.filter((l) => l.stage === "Closed won");
  const lost = leads.filter((l) => l.stage === "Closed lost");
  const openStages = STAGES.filter((s) => !s.startsWith("Closed"));

  // --- Velocity: average days a deal spends in each stage before moving on.
  const durations = {};   // stage -> [days]
  const reached = {};     // stage -> count of leads that EVER got there
  const cycles = [];      // days from first touch to Closed won
  leads.forEach((l) => {
    const { born, path } = stageHistory(l);
    const seen = new Set();
    path.forEach((p, i) => {
      seen.add(p.stage);
      const end = path[i + 1] ? path[i + 1].at : (l.stage.startsWith("Closed") ? p.at : Date.now());
      if (!p.stage.startsWith("Closed") && path[i + 1]) {
        (durations[p.stage] = durations[p.stage] || []).push(Math.max(0, (end - p.at) / 864e5));
      }
    });
    seen.forEach((s) => { reached[s] = (reached[s] || 0) + 1; });
    if (l.stage === "Closed won" && l.closedAt) cycles.push(Math.max(0, (l.closedAt - born) / 864e5));
  });
  const avg = (a) => (a && a.length ? a.reduce((s, x) => s + x, 0) / a.length : 0);
  const velocity = openStages.map((s) => ({ stage: s, days: avg(durations[s]), n: (durations[s] || []).length }));
  const cycleDays = avg(cycles);

  // --- Conversion: of the deals that reached stage N, how many reached N+1?
  const conversion = [];
  for (let i = 0; i < openStages.length - 1; i++) {
    const from = openStages[i], to = openStages[i + 1];
    const a = reached[from] || 0, b = reached[to] || 0;
    conversion.push({ from, to, pct: a > 0 ? Math.min(1, b / a) : 0, a, b });
  }
  const everQualified = reached["Qualified"] || 0;
  const winRate = (won.length + lost.length) > 0 ? won.length / (won.length + lost.length) : 0;

  // --- Vertical performance: where do we actually win, and how big?
  const verticals = VERTICALS.map((v) => {
    const vl = leads.filter((l) => l.vertical === v);
    const vw = vl.filter((l) => l.stage === "Closed won");
    const vlo = vl.filter((l) => l.stage === "Closed lost");
    const dec = vw.length + vlo.length;
    const vCycles = vw.filter((l) => l.closedAt).map((l) => Math.max(0, (l.closedAt - stageHistory(l).born) / 864e5));
    return {
      vertical: v,
      open: vl.filter((l) => !l.stage.startsWith("Closed")).reduce((s, l) => s + (Number(l.value) || 0), 0),
      wonValue: vw.reduce((s, l) => s + (Number(l.value) || 0), 0),
      winRate: dec ? vw.length / dec : 0,
      decided: dec,
      avgDeal: vw.length ? vw.reduce((s, l) => s + (Number(l.value) || 0), 0) / vw.length : 0,
      cycle: avg(vCycles),
      count: vl.length,
    };
  }).filter((v) => v.count > 0).sort((a, b) => b.wonValue + b.open - (a.wonValue + a.open));

  // --- Risk register: the biggest open deals that are quietly dying.
  const risks = open.map((l) => {
    const flags = [];
    const silent = daysAgo(l.updatedAt);
    if (silent >= 14) flags.push(`silent ${silent}d`);
    if (!l.decisionMaker && !l.contact) flags.push("no decision-maker");
    const contacts = [l.decisionMaker, l.contact].filter(Boolean);
    if (contacts.length === 1 && (Number(l.value) || 0) >= 500000) flags.push("single-threaded");
    if ((l.noAnswerStreak || 0) >= RULES.noAnswerLimit) flags.push(`${l.noAnswerStreak}× no answer`);
    if (l.followUp && daysAgo(new Date(l.followUp + "T00:00:00").getTime()) >= 7) flags.push("follow-up blown");
    const stageAge = l.stageEnteredAt ? daysAgo(l.stageEnteredAt) : 0;
    if (stageAge >= 30 && (STAGE_WEIGHTS[l.stage] || 0) >= 0.5) flags.push(`${stageAge}d in ${l.stage}`);
    return { lead: l, flags, exposure: flags.length ? Number(l.value) || 0 : 0 };
  }).filter((r) => r.flags.length > 0).sort((a, b) => b.exposure - a.exposure);
  const atRisk = risks.reduce((s, r) => s + r.exposure, 0);

  // --- Recurring book: PoC is a subscription business and this was invisible.
  const mrr = won.reduce((s, l) => s + (Number(l.recurringMonthly) || 0), 0);
  const pipelineMrr = open.reduce((s, l) => s + (Number(l.recurringMonthly) || 0) * (STAGE_WEIGHTS[l.stage] || 0), 0);

  // --- Funnel health: is top-of-funnel keeping up with what we're consuming?
  const { start } = quarterBounds();
  const createdQ = leads.filter((l) => stageHistory(l).born >= start.getTime());
  const consumedQ = leads.filter((l) => l.closedAt && l.closedAt >= start.getTime());
  const created = createdQ.reduce((s, l) => s + (Number(l.value) || 0), 0);
  const consumed = consumedQ.reduce((s, l) => s + (Number(l.value) || 0), 0);

  return { velocity, conversion, cycleDays, winRate, verticals, risks, atRisk, mrr, pipelineMrr, created, consumed, everQualified, wonCount: won.length, lostCount: lost.length };
}

// Tiny trend line for the daily snapshot series — no chart library, no dependency.
function Spark({ points, color, height = 34 }) {
  if (!points || points.length < 2) return <div style={{ ...mono, fontSize: 10, color: C.muted, height }}>Collecting — trends appear after a few days of use</div>;
  const w = 100, max = Math.max(...points, 1), min = Math.min(...points, 0);
  const span = max - min || 1;
  const d = points.map((p, i) => `${(i / (points.length - 1)) * w},${height - ((p - min) / span) * (height - 4) - 2}`).join(" ");
  return (
    <svg viewBox={`0 0 ${w} ${height}`} preserveAspectRatio="none" style={{ width: "100%", height, display: "block" }}>
      <polyline points={d} fill="none" stroke={color} strokeWidth="1.6" vectorEffect="non-scaling-stroke" strokeLinejoin="round" strokeLinecap="round" />
    </svg>
  );
}
function CadenceEditor({ state, update }) {
  const r = { ...DEFAULT_CADENCE, ...(state.cadenceRules || {}), stages: { ...DEFAULT_CADENCE.stages, ...((state.cadenceRules || {}).stages || {}) }, call: { ...DEFAULT_CADENCE.call, ...((state.cadenceRules || {}).call || {}) }, verticalPace: { ...((state.cadenceRules || {}).verticalPace || {}) } };
  const openStages = STAGES.filter((s) => !s.startsWith("Closed"));
  const setRules = (patch) => update({ cadenceRules: { ...r, ...patch } });
  const num = (v, d) => { const n = Number(v); return n > 0 ? n : d; };
  const dirty = JSON.stringify({ stages: r.stages, call: r.call, noAnswerLimit: r.noAnswerLimit, verticalPace: r.verticalPace }) !== JSON.stringify({ stages: DEFAULT_CADENCE.stages, call: DEFAULT_CADENCE.call, noAnswerLimit: DEFAULT_CADENCE.noAnswerLimit, verticalPace: {} });
  const box = { width: 58, background: C.fieldBg, border: `1px solid ${C.line}`, borderRadius: 8, color: C.text, padding: "6px 8px", fontSize: 13, outline: "none", textAlign: "center" };

  return (
    <Card style={{ marginTop: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", flexWrap: "wrap", gap: 8 }}>
        <Label>Cadence rules — the follow-up clock, team-wide</Label>
        {dirty && <button onClick={() => setRules({ stages: { ...DEFAULT_CADENCE.stages }, call: { ...DEFAULT_CADENCE.call }, noAnswerLimit: DEFAULT_CADENCE.noAnswerLimit, verticalPace: {} })} style={{ ...mono, fontSize: 10, color: C.muted, background: "none", border: "none", cursor: "pointer", textDecoration: "underline" }}>reset to defaults</button>}
      </div>

      <div style={{ ...mono, fontSize: 10, color: C.muted, marginTop: 10, marginBottom: 8, letterSpacing: "0.08em" }}>DAYS UNTIL NEXT TOUCH WHEN A DEAL ENTERS…</div>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
        {openStages.map((s) => (
          <label key={s} style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            <span style={{ fontSize: 12, color: C.muted }}>{s}</span>
            <input type="number" min="1" max="60" value={r.stages[s] || ""} onChange={(e) => setRules({ stages: { ...r.stages, [s]: num(e.target.value, r.stages[s]) } })} style={box} />
          </label>
        ))}
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12, marginTop: 16 }}>
        <label style={{ display: "flex", flexDirection: "column", gap: 4 }}>
          <span style={{ fontSize: 12, color: C.muted }}>After "no answer" (days)</span>
          <input type="number" min="1" max="30" value={r.call.noAnswer} onChange={(e) => setRules({ call: { ...r.call, noAnswer: num(e.target.value, r.call.noAnswer) } })} style={box} />
        </label>
        <label style={{ display: "flex", flexDirection: "column", gap: 4 }}>
          <span style={{ fontSize: 12, color: C.muted }}>After "spoke" (days)</span>
          <input type="number" min="1" max="30" value={r.call.spoke} onChange={(e) => setRules({ call: { ...r.call, spoke: num(e.target.value, r.call.spoke) } })} style={box} />
        </label>
        <label style={{ display: "flex", flexDirection: "column", gap: 4 }}>
          <span style={{ fontSize: 12, color: C.muted }}>No-answer strikes → nurture</span>
          <input type="number" min="1" max="10" value={r.noAnswerLimit} onChange={(e) => setRules({ noAnswerLimit: num(e.target.value, r.noAnswerLimit) })} style={box} />
        </label>
      </div>

      <div style={{ ...mono, fontSize: 10, color: C.muted, marginTop: 18, marginBottom: 8, letterSpacing: "0.08em" }}>PER-VERTICAL PACE — MULTIPLIES THE STAGE CLOCK (1 = STANDARD, 2 = TWICE AS PATIENT)</div>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
        {VERTICALS.map((v) => (
          <label key={v} style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            <span style={{ fontSize: 12, color: C.muted }}>{v}</span>
            <input type="number" min="0.5" max="4" step="0.5" value={r.verticalPace[v] || 1} onChange={(e) => { const n = Number(e.target.value); setRules({ verticalPace: { ...r.verticalPace, [v]: n > 0 ? n : 1 } }); }} style={box} />
          </label>
        ))}
      </div>
      <div style={{ ...mono, fontSize: 10, color: C.muted, marginTop: 14, lineHeight: 1.6 }}>
        Changes apply to the next stage move or logged call — existing follow-up dates aren't retroactively shifted. Rules sync to every signed-in agent.
        {r.verticalPace["Mining"] > 1 && <><br />e.g. Mining at ×{r.verticalPace["Mining"]}: a Proposal now books +{Math.max(1, Math.round((r.stages["Proposal"] || 3) * r.verticalPace["Mining"]))}d instead of +{r.stages["Proposal"] || 3}d.</>}
      </div>
    </Card>
  );
}

function OwnerDashboard({ state, update, commission, commissionBase, pipelineValue, refreshTeam, live, setOpenLead }) {
  const [targetDraft, setTargetDraft] = useState("");
  const [refreshing, setRefreshing] = useState(false);

  // LIVE MODE — group the RLS-visible pool (owner sees every agent's leads) by agent.
  const hasAttribution = live && state.leads.some((l) => l._agentId);
  let team;
  if (hasAttribution) {
    const byAgent = {};
    state.leads.forEach((l) => {
      const id = l._agentId || "unknown";
      (byAgent[id] = byAgent[id] || { name: l._agentName || "Agent", leads: [] }).leads.push(l);
    });
    team = Object.values(byAgent).map((a) => {
      const won = a.leads.filter((l) => l.stage === "Closed won");
      const lost = a.leads.filter((l) => l.stage === "Closed lost");
      const decided = won.length + lost.length;
      const attributed = won.filter((l) => l.source === "platform" || l.source === "referral").reduce((s, l) => s + (Number(l.value) || 0), 0);
      return {
        name: a.name,
        pipeline: a.leads.filter((l) => !l.stage.startsWith("Closed")).reduce((s, l) => s + (Number(l.value) || 0), 0),
        closed: won.reduce((s, l) => s + (Number(l.value) || 0), 0),
        winRate: decided ? won.length / decided : 0,
        active: a.leads.filter((l) => !l.stage.startsWith("Closed")).length,
        acts7d: a.leads.reduce((s, l) => s + (l.activities || []).filter((x) => Date.now() - x.at < 7 * 864e5).length, 0),
        stale: a.leads.filter((l) => !l.stage.startsWith("Closed") && daysAgo(l.updatedAt) >= 7).length,
        commission: attributed * COMMISSION_RATE,
        demo: false,
      };
    }).sort((x, y) => y.pipeline - x.pipeline);
  } else {
    // LOCAL / DEMO MODE — your live numbers plus placeholder agents.
    const won = state.leads.filter((l) => l.stage === "Closed won");
    const lost = state.leads.filter((l) => l.stage === "Closed lost");
    const decided = won.length + lost.length;
    team = [{
      name: (state.agentName || "You") + " (live)",
      pipeline: pipelineValue,
      closed: won.reduce((s, l) => s + (Number(l.value) || 0), 0),
      winRate: decided ? won.length / decided : 0,
      active: state.leads.filter((l) => !l.stage.startsWith("Closed")).length,
      acts7d: state.leads.reduce((s, l) => s + (l.activities || []).filter((x) => Date.now() - x.at < 7 * 864e5).length, 0),
      stale: state.leads.filter((l) => !l.stage.startsWith("Closed") && daysAgo(l.updatedAt) >= 7).length,
      commission: commission,
      demo: false,
    }, ...DEMO_AGENTS.map((a) => ({ ...a, acts7d: 0, stale: 0, commission: 0 }))];
  }

  const teamPipeline = team.reduce((s, a) => s + a.pipeline, 0);
  const teamClosed = team.reduce((s, a) => s + a.closed, 0);
  const teamCommission = team.reduce((s, a) => s + (a.commission || 0), 0);
  const maxPipe = Math.max(...team.map((a) => a.pipeline), 1);
  const cols = "minmax(120px,1.3fr) 1.8fr 1fr 0.8fr 0.6fr 0.7fr 0.7fr 1fr";

  const doRefresh = async () => { setRefreshing(true); await refreshTeam(); setRefreshing(false); };

  // Director metrics — memoised; this walks every activity on every lead.
  const M = useMemo(() => directorMetrics(state.leads), [state.leads]);
  const snaps = state.snapshots || [];

  // ---- Director layer: forecast, win/loss intel, payout liability ----
  const target = Math.max(1, (state.targets && Number(state.targets.revenue)) || 500000);
  const now = new Date();
  const { start: qStart, end: qEnd, q: qNum } = quarterBounds(now);
  const qElapsedRaw = (now - qStart) / (qEnd - qStart);
  const qElapsed = Math.min(1, Math.max(0.02, qElapsedRaw));
  const daysLeft = Math.max(0, Math.ceil((qEnd - now) / 864e5));
  const openLeads = state.leads.filter((l) => !l.stage.startsWith("Closed"));
  const weighted = openLeads.reduce((s2, l) => s2 + (Number(l.value) || 0) * (STAGE_WEIGHTS[l.stage] || 0), 0);
  // closedAt, not updatedAt — editing a deal won last quarter used to silently re-date it
  // into this one and inflate the forecast.
  const wonQTD = state.leads.filter((l) => l.stage === "Closed won" && inThisQuarter(l.closedAt || l.updatedAt)).reduce((s2, l) => s2 + (Number(l.value) || 0), 0);
  // Below ~20% elapsed, dividing by a tiny fraction projects fantasy numbers (one deal on
  // day 2 of a quarter used to project 50× itself). Withhold it until it means something.
  const projReliable = qElapsedRaw >= 0.2;
  const projected = wonQTD / qElapsed;
  const landing = wonQTD + weighted;
  const remaining = Math.max(0, target - wonQTD);
  const coverage = remaining > 0 ? teamPipeline / remaining : Infinity;
  // Pooled win rate across real agents only — the old version averaged the demo rows in,
  // and averaged percentages, so one agent with a single deal outweighed one with forty.
  const realTeam = team.filter((a) => !a.demo);
  const pooledWon = M.wonCount, pooledDecided = M.wonCount + M.lostCount;
  const teamWinRate = pooledDecided > 0 ? pooledWon / pooledDecided : 0;
  const wonPct = Math.min(100, (wonQTD / target) * 100);
  const weightedPct = Math.max(0, Math.min(100, (landing / target) * 100) - wonPct);
  const setTarget = () => { const v = Number(String(targetDraft).replace(/[^\d]/g, "")); if (v > 0) update({ targets: { ...(state.targets || {}), revenue: v } }); setTargetDraft(""); };

  const lostLeads = state.leads.filter((l) => l.stage === "Closed lost");
  const reasonMap = {};
  lostLeads.forEach((l) => { const r = (l.lostReason || "Unspecified").split(" — ")[0]; reasonMap[r] = reasonMap[r] || { n: 0, v: 0 }; reasonMap[r].n++; reasonMap[r].v += Number(l.value) || 0; });
  const reasons = Object.entries(reasonMap).sort((a, b) => b[1].n - a[1].n).slice(0, 7);
  const maxReasonN = Math.max(...reasons.map(([, r]) => r.n), 1);

  const wonAll = state.leads.filter((l) => l.stage === "Closed won");
  const partnerWon = wonAll.filter((l) => l.partnerId);
  const partnerOwed = partnerWon.reduce((s2, l) => s2 + (Number(l.value) || 0) * PARTNER_RATE, 0);
  const partnerMrr = partnerWon.reduce((s2, l) => s2 + (Number(l.recurringMonthly) || 0) * PARTNER_RATE, 0);
  const agentOwed = hasAttribution ? teamCommission : commission;
  const projAgent = openLeads.filter((l) => l.source === "platform" || l.source === "referral").reduce((s2, l) => s2 + (Number(l.value) || 0) * (STAGE_WEIGHTS[l.stage] || 0), 0) * COMMISSION_RATE;
  const projPartner = openLeads.filter((l) => l.partnerId).reduce((s2, l) => s2 + (Number(l.value) || 0) * (STAGE_WEIGHTS[l.stage] || 0), 0) * PARTNER_RATE;
  const liabRow = { display: "flex", justifyContent: "space-between", gap: 10, padding: "7px 0", borderBottom: `1px solid ${C.line}` };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
        <div style={{ ...disp, fontSize: 13, color: C.muted }}>Team overview</div>
        {live && <Btn small onClick={doRefresh} disabled={refreshing}>{refreshing ? "Refreshing…" : "↻ Refresh team"}</Btn>}
      </div>
      <Card style={{ marginBottom: 14 }}>
          <Label>Agents — pipeline, closed, win rate, activity</Label>
          <div className="ssh-scrollx ssh-desk-only" style={{ marginTop: 12, display: "grid", gap: 0, overflowX: "auto" }}>
            <div style={{ display: "grid", gridTemplateColumns: cols, gap: 10, ...mono, fontSize: 10, color: C.muted, letterSpacing: "0.12em", textTransform: "uppercase", paddingBottom: 8, borderBottom: `1px solid ${C.line}`, minWidth: 820 }}>
              <span>Agent</span><span>Pipeline</span><span>Closed</span><span>Win rate</span><span>Deals</span><span>Acts 7d</span><span>Stale</span><span>Commission</span>
            </div>
            {team.map((a, i) => (
              <div key={i} style={{ display: "grid", gridTemplateColumns: cols, gap: 10, alignItems: "center", padding: "10px 0", borderBottom: `1px solid ${C.line}`, minWidth: 820 }}>
                <div>
                  <div style={{ fontSize: 12.5, fontWeight: 700, color: a.demo ? C.muted : C.text }}>{a.name}</div>
                  {a.demo && <div style={{ ...mono, fontSize: 9.5, color: C.goldDim, letterSpacing: "0.12em" }}>DEMO DATA</div>}
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <div style={{ flex: 1 }}><Bar pct={(a.pipeline / maxPipe) * 100} color={a.demo ? C.line : C.gold} /></div>
                  <span style={{ ...mono, fontSize: 10.5, color: C.muted, minWidth: 70, textAlign: "right" }}>{fmtR(a.pipeline)}</span>
                </div>
                <span style={{ ...mono, fontSize: 11.5, color: a.demo ? C.muted : C.text }}>{fmtR(a.closed)}</span>
                <span style={{ ...mono, fontSize: 11.5, color: a.winRate >= 0.3 ? C.ok : C.muted }}>{Math.round(a.winRate * 100)}%</span>
                <span style={{ ...mono, fontSize: 11.5, color: C.muted }}>{a.active}</span>
                <span style={{ ...mono, fontSize: 11.5, color: a.acts7d >= 5 ? C.ok : C.muted }}>{a.acts7d}</span>
                <span style={{ ...mono, fontSize: 11.5, color: a.stale > 0 ? C.danger : C.muted }}>{a.stale}</span>
                <span style={{ ...mono, fontSize: 11.5, color: (a.commission || 0) > 0 ? C.gold : C.muted }}>{fmtR(a.commission || 0)}</span>
              </div>
            ))}
          </div>
          {/* Mobile: the same rows as cards. The table forced an 820px sideways drag on a phone. */}
          <div className="ssh-mob-only" style={{ gap: 10, marginTop: 12 }}>
            {team.map((a, i) => (
              <div key={"m" + i} style={{ border: `1px solid ${a.demo ? C.line : C.line}`, borderRadius: 12, padding: 12, background: C.panel2, opacity: a.demo ? 0.6 : 1 }}>

                  <span style={{ ...mono, fontSize: 11.5, color: C.gold }}>{fmtR(a.pipeline)}</span>
                </div>
                <div style={{ marginTop: 8 }}><Bar pct={(a.pipeline / maxPipe) * 100} color={a.demo ? C.line : C.gold} /></div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8, marginTop: 12 }}>
                  {[["CLOSED", fmtR(a.closed), C.text], ["WIN RATE", Math.round(a.winRate * 100) + "%", a.winRate >= 0.3 ? C.ok : C.muted], ["DEALS", String(a.active), C.text],
                    ["ACTS 7D", String(a.acts7d || 0), (a.acts7d || 0) >= 5 ? C.ok : C.muted], ["STALE", String(a.stale || 0), (a.stale || 0) > 0 ? C.danger : C.muted], ["COMMISSION", fmtR(a.commission || 0), (a.commission || 0) > 0 ? C.gold : C.muted]].map(([k, v, col]) => (

                      <div style={{ ...mono, fontSize: 9, color: C.muted, letterSpacing: "0.1em" }}>{k}</div>

// ============ PIPELINE ============
const LOST_REASONS = ["Price", "Went with competitor", "No budget", "Bad timing", "No response", "Not a fit", "Other"];
function Pipeline({ state, upsertLead, setOpenLead, update }) {
  const [showAdd, setShowAdd] = useState(false);
  const [draft, setDraft] = useState({ company: "", contact: "", phone: "", vertical: "Security", value: "", recurringMonthly: "" });
  const [draggingId, setDraggingId] = useState(null);
  const [overStage, setOverStage] = useState(null);
  const movedRef = useRef(false);
  // Touch path: drag-and-drop never fires on phones/tablets, so every card gets a
  // tap-to-move menu (⋮). Both paths funnel through moveLead below.
  const [stageMenuId, setStageMenuId] = useState(null);
  // Dropping into "Closed lost" pauses for a reason — the only way win/loss
  // reporting ever gets data. { leadId, reason, note } while the prompt is open.
  const [lostPrompt, setLostPrompt] = useState(null);
  const moveLead = (lead, stage) => {
    if (!lead || lead.stage === stage) return;
    if (stage === "Closed lost") { setLostPrompt({ leadId: lead.id, reason: LOST_REASONS[0], note: "" }); return; }
    upsertLead(withActivity({ ...lead, stage }, "stage", `Moved to ${stage}`));
  };
  const confirmLost = () => {
    const lead = state.leads.find((l) => l.id === lostPrompt.leadId);
    if (lead) {
      const why = lostPrompt.reason + (lostPrompt.note.trim() ? ` — ${lostPrompt.note.trim()}` : "");
      upsertLead(withActivity({ ...lead, stage: "Closed lost", lostReason: why }, "stage", `Closed lost: ${why}`));
    }
    setLostPrompt(null);
  };

  // Filters
  const [query, setQuery] = useState("");
  const [fVert, setFVert] = useState("All");
  const [fFlag, setFFlag] = useState("all"); // all | stale | due
  const q = query.trim().toLowerCase();
  // Memoised — this used to re-scan every lead on every keystroke in the search box.
  const visible = useMemo(() => state.leads.filter((l) => {
    if (fVert !== "All" && l.vertical !== fVert) return false;
    if (fFlag === "stale" && !(daysAgo(l.updatedAt) >= 7 && !l.stage.startsWith("Closed"))) return false;
    if (fFlag === "due" && !followUpDue(l)) return false;
    if (q && !((l.company || "") + " " + (l.contact || "") + " " + (l.decisionMaker || "") + " " + (l.notes || "")).toLowerCase().includes(q)) return false;
    return true;
  }), [state.leads, fVert, fFlag, q]);
  const filtering = q || fVert !== "All" || fFlag !== "all";

  // Mobile: the board snap-scrolls one 86vw column at a time across seven stages, with no
  // way to know which one you're on. This pager is both the indicator and the jump control.
  const boardRef = useRef(null);
  const [activeStage, setActiveStage] = useState(STAGES[0]);
  const jumpTo = (stage) => {
    const el = boardRef.current && boardRef.current.querySelector(`[data-stage="${stage}"]`);
    if (el && el.scrollIntoView) el.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
    setActiveStage(stage);
  };
  useEffect(() => {
    const el = boardRef.current;
    if (!el) return;
    let raf = null;
    const onScroll = () => {
      if (raf) return;
      raf = requestAnimationFrame(() => {
        raf = null;
        const mid = el.scrollLeft + el.clientWidth / 2;
        let best = null, bestD = Infinity;
        el.querySelectorAll("[data-stage]").forEach((c) => {
          const d = Math.abs(c.offsetLeft + c.offsetWidth / 2 - mid);
          if (d < bestD) { bestD = d; best = c.getAttribute("data-stage"); }
        });
        if (best) setActiveStage(best);
      });
    };
    el.addEventListener("scroll", onScroll, { passive: true });
    return () => { el.removeEventListener("scroll", onScroll); if (raf) cancelAnimationFrame(raf); };
  }, []);

  const [dupeMsg, setDupeMsg] = useState("");
  const [conflict, setConflict] = useState(null);   // { ownerName, stage, company } from another agent
  const [checkingDupe, setCheckingDupe] = useState(false);
  const addLead = async () => {
    if (!draft.company.trim()) return;
    // Local pool first — cheap, and covers the solo/offline case.
    const dupe = findDupe(state.leads, draft);
    if (dupe) {
      upsertLead(mergeLead(dupe, { ...draft, value: Number(draft.value) || 0 }));
      setDupeMsg(`${draft.company} is already in your pipeline (${dupe.stage}) — merged your new details into it instead of duplicating.`);
      setDraft({ company: "", contact: "", phone: "", vertical: "Security", value: "", recurringMonthly: "" });
      setShowAdd(false); setConflict(null);
      setTimeout(() => setDupeMsg(""), 6000);
      return;
    }
    // Then the shared registry — is another agent already on this company?
    setCheckingDupe(true);
    const team = await findTeamDupe(draft);
    setCheckingDupe(false);
    if (team && !conflict) {
      // First press just warns — the agent decides whether to proceed or back off.
      setConflict(team);
      return;
    }
    upsertLead({ id: "L" + Date.now(), ...draft, value: Number(draft.value) || 0, recurringMonthly: Number(draft.recurringMonthly) || 0, notes: "", stage: "New", source: "manual", updatedAt: Date.now(), activities: conflict ? [{ at: Date.now(), type: "note", summary: `⚠ Added despite ${conflict.ownerName} already working this account (${conflict.stage})` }] : [] });
    setDraft({ company: "", contact: "", phone: "", vertical: "Security", value: "", recurringMonthly: "" });
    setShowAdd(false); setConflict(null);
  };

  const dropOn = (stage) => {
    const id = draggingId;
    setDraggingId(null);
    setOverStage(null);
    if (!id) return;
    const lead = state.leads.find((l) => l.id === id);
    if (lead && lead.stage !== stage) {
      movedRef.current = true; // suppress the click that follows a drag
      moveLead(lead, stage);
    }
  };

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16, flexWrap: "wrap", gap: 8 }}>
        <div>
          <div style={{ ...disp, fontSize: 14, color: C.text }}>Deal pipeline</div>
          <div style={{ fontSize: 13, color: C.muted, marginTop: 5 }}>Drag deals between stages. Closed won updates your commission live.</div>
        </div>
        <Btn kind="gold" onClick={() => setShowAdd(!showAdd)}>{showAdd ? "Cancel" : "+ Add lead"}</Btn>
      </div>

      <div className="ssh-filters" style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap", marginBottom: 14 }}>

      </div>
      <div style={{ ...mono, fontSize: 10.5, color: C.muted, marginTop: 12 }}>◆ PLATFORM / REFERRAL deals earn 10% commission · red border = untouched 7+ days</div>

      {lostPrompt && (() => {
